<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=650">
    <title>Stealth Monitor</title>
    
    <link rel="icon" type="image/x-icon" href="hidden-eye-icon-diagonal-line-for-eye-vector.ico">
    <link rel="apple-touch-icon" href="hidden-eye-icon-diagonal-line-for-eye-vector.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="hidden-eye-icon-diagonal-line-for-eye-vector.ico">

    <style>
        body {
            background-color: #000000;
            color: #555555;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            transition: background-color 0.3s;
        }

        /* --- SYNC & TOP BAR --- */
        #syncBar { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        
        .sync-btn { background: transparent; border: 1px solid #333; color: #555; font-family: 'Courier New', monospace; font-size: 11px; padding: 6px 12px; cursor: pointer; transition: all 0.2s; }
        .sync-btn:hover { border-color: #777; color: #999; background: #0a0a0a; }
        
        #syncStatus { font-size: 10px; letter-spacing: 1px; padding: 4px 10px; border-radius: 2px; }
        .status-ok { color: #4a7; } .status-err { color: #f44; font-weight: bold; } .status-working { color: #888; }
        
        #setupPanel { display: none; gap: 8px; margin-bottom: 15px; width: 100%; justify-content: center; }
        #setupPanel.visible { display: flex; }
        #setupPanel input { background: #111; border: 1px solid #333; color: #777; width: 150px; padding: 5px; font-size: 10px; font-family: 'Courier New', monospace; outline: none; }

        /* --- MAIN WORKSPACE (MULTI-COLUMN) --- */
        #workspaceWrapper { width: 100%; overflow-x: auto; padding-bottom: 20px; }
        #workspaceWrapper::-webkit-scrollbar { height: 6px; }
        #workspaceWrapper::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        #workspace { display: flex; gap: 20px; min-width: max-content; align-items: flex-start; justify-content: flex-start; }
        
        .column-container { width: 450px; display: flex; flex-direction: column; border: 1px solid #222; background-color: #050505; }

        /* TABS */
        .tabBar { display: flex; overflow-x: auto; border-bottom: 1px solid #222; background-color: #020202; align-items: center; }
        .tabBar::-webkit-scrollbar { height: 0px; } 
        
        .tab-btn { background: transparent; color: #555; border: none; padding: 10px 14px; cursor: pointer; font-family: 'Courier New', monospace; font-size: 11px; border-bottom: 2px solid transparent; white-space: nowrap; transition: 0.2s; outline: none; }
        .tab-btn:hover { color: #888; background: #0a0a0a; }
        .tab-btn.active { color: #bbb; border-bottom: 2px solid #555; background: #0a0a0a; }
        
        .tab-controls { display: flex; margin-left: auto; padding-right: 5px; gap: 5px; }
        .icon-btn { background: transparent; border: none; color: #444; cursor: pointer; font-family: monospace; font-size: 11px; padding: 4px; transition: 0.2s; }
        .icon-btn:hover { color: #aaa; }

        /* WIDGET CONTAINER */
        .widgetContainer { min-height: 200px; width: 100%; }
        .stealth-widget { filter: grayscale(100%) contrast(1.2); opacity: 0.7; transition: all 0.3s ease; width: 100%; }
        .stealth-widget:hover { opacity: 1; }

        /* BOTTOM INPUT BAR */
        .bottomInputBar { display: flex; border-top: 1px solid #222; background-color: #0a0a0a; padding: 5px 10px; align-items: center; }
        .colTickerInput { flex-grow: 1; background: transparent; border: none; color: #777; font-family: 'Courier New', monospace; font-size: 11px; outline: none; padding: 8px; }
        .import-wrapper { display: flex; align-items: center; gap: 8px; border-left: 1px solid #222; padding-left: 10px; }
        .import-wrapper span { color: #444; font-size: 10px; }
        .bottom-btn { background: transparent; border: 1px solid #333; color: #777; font-family: 'Courier New', monospace; font-size: 10px; padding: 4px 8px; cursor: pointer; transition: 0.2s; }
        .bottom-btn:hover { color: #aaa; border-color: #555; }

        /* --- MODALS --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0,0,0,0.9); z-index: 9000; flex-direction: column; align-items: center; justify-content: center; }
        .modal-overlay.visible { display: flex; }
        .editor-content { background: #050505; border: 1px solid #333; padding: 20px; width: 90%; max-width: 600px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.95); }
        .editor-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #333; padding-bottom: 10px; margin-bottom: 10px; }
        .editor-header span { color: #888; font-weight: bold; font-size: 11px; }
        
        textarea.stealth-textarea { background-color: #0a0a0a; color: #777; border: 1px solid #222; width: 100%; height: 350px; font-family: 'Courier New', monospace; padding: 15px; outline: none; resize: vertical; line-height: 1.5; box-sizing: border-box; }
        textarea.stealth-textarea:focus { border-color: #444; }
        
        .editor-actions { display: flex; justify-content: space-between; margin-top: 10px; }

        /* --- COLOR MODE --- */
        body.color-mode .stealth-widget { filter: grayscale(0%) contrast(1); opacity: 1; }
    </style>
</head>
<body>

    <div id="syncBar">
        <button class="sync-btn" onclick="toggleSetup()">⚙ CONFIG</button>
        <button class="sync-btn" id="colorToggleBtn" onclick="toggleColors()">◑ COLOR</button>
        <button class="sync-btn" onclick="addColumn()">⊞ NEW COLUMN</button>
        <button class="sync-btn" onclick="openMasterEditor()">▤ MASTER BULK</button>
        <button class="sync-btn" onclick="toggleJournal()">⊟ NOTES</button>
        <span id="syncStatus" class="status-working">INITIALIZING...</span>
        
        <div id="setupPanel">
            <input type="password" id="tokenInput" placeholder="GitHub Token">
            <input type="text" id="gistIdInput" placeholder="Gist ID">
            <button class="sync-btn" onclick="saveCredentials()">SAVE</button>
        </div>
    </div>

    <div id="workspaceWrapper">
        <div id="workspace"></div>
    </div>

    <div id="tabEditorModal" class="modal-overlay">
        <div class="editor-content">
            <div class="editor-header">
                <span id="tabEditorTitle">BATCH IMPORT</span>
                <span style="font-size: 9px; color: #555;">Use --- GroupName for dividers</span>
            </div>
            <textarea id="tabEditor" class="stealth-textarea" spellcheck="false"></textarea>
            <div class="editor-actions">
                <button class="bottom-btn" onclick="closeTabEditor()">[X] CANCEL</button>
                <button class="bottom-btn" style="border-color: #555; color: #aaa;" onclick="saveTabEdit()">[+] SAVE TAB</button>
            </div>
        </div>
    </div>

    <div id="masterEditorModal" class="modal-overlay">
        <div class="editor-content">
            <div class="editor-header">
                <span>MASTER RAW EDIT (ALL TABS)</span>
                <span style="font-size: 9px; color: #555;">Use === TabName for new tabs</span>
            </div>
            <textarea id="masterEditor" class="stealth-textarea" spellcheck="false"></textarea>
            <div class="editor-actions">
                <button class="bottom-btn" onclick="closeMasterEditor()">[X] CANCEL</button>
                <button class="bottom-btn" style="border-color: #555; color: #aaa;" onclick="saveMasterEdit()">[+] OVERWRITE ALL</button>
            </div>
        </div>
    </div>

    <div id="journalModal" class="modal-overlay">
        <div class="editor-content" style="height: auto;">
            <div class="editor-header">
                <span>--- SECURE LOGS</span>
                <button class="icon-btn" onclick="toggleJournal()">[X]</button>
            </div>
            <textarea id="stealthJournal" class="stealth-textarea" style="height: 250px;" placeholder="Log ideas or structural calculations here..."></textarea>
        </div>
    </div>

    <script>
        // INTERNAL DATABASE
        const popularTickers = [
            { symbol: "AAPL", exchange: "NASDAQ" }, { symbol: "MSFT", exchange: "NASDAQ" },
            { symbol: "GOOGL", exchange: "NASDAQ" }, { symbol: "AMZN", exchange: "NASDAQ" },
            { symbol: "NVDA", exchange: "NASDAQ" }, { symbol: "TSLA", exchange: "NASDAQ" },
            { symbol: "BRK.B", exchange: "NYSE" }, { symbol: "BTCUSDT", exchange: "BINANCE" }
        ];

        let myTickers = [];
        let myJournal = "";
        
        // Multi-column state: Array storing the active tab name for each column
        let columnsState = ["MAIN"]; 
        let editingTabName = ""; // Tracks which tab is currently open in Batch Import
        
        const GIST_FILENAME = 'tickers.json';
        const workspace = document.getElementById('workspace');
        const journalInput = document.getElementById('stealthJournal');
        let journalTimeout;

        // --- LOCAL STORAGE LOAD ---
        try {
            const localData = JSON.parse(localStorage.getItem('stealthData'));
            if (localData && !Array.isArray(localData)) {
                myTickers = localData.tickers || [];
                myJournal = localData.journal || "";
            } else if (Array.isArray(localData)) { 
                myTickers = localData;
            }

            const localCols = JSON.parse(localStorage.getItem('stealthCols'));
            if (localCols && Array.isArray(localCols) && localCols.length > 0) {
                columnsState = localCols;
            }
        } catch(e) {}
        
        journalInput.value = myJournal;

        // --- COLOR MODE ---
        let isColorMode = localStorage.getItem('colorMode') === 'true';
        function applyColorMode() {
            const btn = document.getElementById('colorToggleBtn');
            if (isColorMode) { document.body.classList.add('color-mode'); if(btn) btn.innerText = '◑ STEALTH'; } 
            else { document.body.classList.remove('color-mode'); if(btn) btn.innerText = '◑ COLOR'; }
        }
        function toggleColors() { isColorMode = !isColorMode; localStorage.setItem('colorMode', isColorMode); applyColorMode(); }

        // --- SYNC CORE ---
        function setStatus(msg, className) { document.getElementById('syncStatus').textContent = msg; document.getElementById('syncStatus').className = className; }
        function getCreds() { return { token: localStorage.getItem('gistToken'), id: localStorage.getItem('gistId') }; }

        function toggleSetup() { document.getElementById('setupPanel').classList.toggle('visible'); }

        function saveCredentials() {
            localStorage.setItem('gistToken', document.getElementById('tokenInput').value.trim());
            localStorage.setItem('gistId', document.getElementById('gistIdInput').value.trim());
            document.getElementById('setupPanel').classList.remove('visible');
            autoPullFromGist(); 
        }

        async function autoPushToGist() {
            const { token, id } = getCreds();
            if (!token) return; 
            setStatus('SAVING...', 'status-working');
            try {
                const res = await fetch(id ? `https://api.github.com/gists/${id}` : 'https://api.github.com/gists', {
                    method: id ? 'PATCH' : 'POST',
                    headers: { 'Authorization': `token ${token}` },
                    body: JSON.stringify({ public: false, files: { [GIST_FILENAME]: { content: JSON.stringify({ tickers: myTickers, journal: myJournal }) } } })
                });
                if (!id) localStorage.setItem('gistId', (await res.json()).id);
                setStatus('✓ SYNCED', 'status-ok');
            } catch (e) { setStatus('SYNC FAILED', 'status-err'); }
        }

        async function autoPullFromGist() {
            const { token, id } = getCreds();
            if (!token || !id) { setStatus('LOCAL MODE', 'status-working'); return; }
            setStatus('UPDATING...', 'status-working');
            try {
                const res = await fetch(`https://api.github.com/gists/${id}?t=${Date.now()}`, { headers: { 'Authorization': `token ${token}` } });
                const cloudContent = JSON.parse((await res.json()).files[GIST_FILENAME].content);
                
                if (Array.isArray(cloudContent)) { myTickers = cloudContent; } 
                else { myTickers = cloudContent.tickers || []; myJournal = cloudContent.journal || ""; }
                
                saveLocalState();
                journalInput.value = myJournal;
                renderApp();
                setStatus('✓ SYNCED', 'status-ok');
            } catch (e) { setStatus('UPDATE FAILED', 'status-err'); }
        }

        function saveLocalState() {
            localStorage.setItem('stealthData', JSON.stringify({ tickers: myTickers, journal: myJournal }));
            localStorage.setItem('stealthCols', JSON.stringify(columnsState));
        }
        function saveLocalAndPush() { saveLocalState(); renderApp(); autoPushToGist(); }

        // --- DATA PARSING ---
        function getParsedTabs() {
            let tabs = [];
            let currentTab = null;

            myTickers.forEach(item => {
                if (item.startsWith('===')) {
                    if (currentTab) tabs.push(currentTab);
                    currentTab = { name: item.replace('===', '').trim() || "UNNAMED", items: [] };
                } else {
                    if (!currentTab) currentTab = { name: "MAIN", items: [] };
                    currentTab.items.push(item);
                }
            });
            if (currentTab) tabs.push(currentTab);
            if (tabs.length === 0) tabs.push({ name: "MAIN", items: [] });
            return tabs;
        }

        function getItemsForTab(tabName) {
            const tabs = getParsedTabs();
            const tab = tabs.find(t => t.name === tabName);
            return tab ? tab.items : [];
        }

        // --- MULTI-COLUMN UI RENDERING ---
        function addColumn() {
            const tabs = getParsedTabs();
            columnsState.push(tabs[0].name); // Add new column defaulting to first tab
            saveLocalState();
            renderApp();
        }

        function removeColumn(index) {
            columnsState.splice(index, 1);
            if(columnsState.length === 0) columnsState = ["MAIN"];
            saveLocalState();
            renderApp();
        }

        function switchColumnTab(colIndex, tabName) {
            columnsState[colIndex] = tabName;
            saveLocalState();
            renderApp();
        }

        function renderApp() {
            const tabs = getParsedTabs();
            workspace.innerHTML = '';

            // Verify active tabs still exist, fallback if deleted via master edit
            columnsState = columnsState.map(colTab => tabs.find(t => t.name === colTab) ? colTab : tabs[0].name);

            columnsState.forEach((activeTabName, colIndex) => {
                const colDiv = document.createElement('div');
                colDiv.className = 'column-container';

                // 1. Tab Bar
                const tabBar = document.createElement('div');
                tabBar.className = 'tabBar';
                
                tabs.forEach(tab => {
                    const btn = document.createElement('button');
                    btn.className = `tab-btn ${tab.name === activeTabName ? 'active' : ''}`;
                    btn.innerText = `[ ${tab.name} ]`;
                    btn.onclick = () => switchColumnTab(colIndex, tab.name);
                    tabBar.appendChild(btn);
                });

                // Tab Controls (Add Tab, Close Column)
                const tabControls = document.createElement('div');
                tabControls.className = 'tab-controls';
                
                const addTabBtn = document.createElement('button');
                addTabBtn.className = 'icon-btn'; addTabBtn.innerText = '[+]'; addTabBtn.title = 'New Tab';
                addTabBtn.onclick = () => {
                    const newName = prompt("Enter new watchlist tab name:");
                    if (newName && newName.trim()) {
                        myTickers.push(`=== ${newName.trim().toUpperCase()}`);
                        switchColumnTab(colIndex, newName.trim().toUpperCase());
                        saveLocalAndPush();
                    }
                };
                
                const closeColBtn = document.createElement('button');
                closeColBtn.className = 'icon-btn'; closeColBtn.innerText = '[X]'; closeColBtn.title = 'Close Column';
                closeColBtn.onclick = () => removeColumn(colIndex);

                tabControls.appendChild(addTabBtn);
                if (columnsState.length > 1) tabControls.appendChild(closeColBtn);
                tabBar.appendChild(tabControls);

                // 2. Widget Container
                const widgetWrap = document.createElement('div');
                widgetWrap.className = 'widgetContainer';
                
                const activeTabData = tabs.find(t => t.name === activeTabName);
                if (activeTabData) {
                    const widgetDiv = document.createElement('div'); 
                    widgetDiv.className = 'stealth-widget';
                    const containerDiv = document.createElement('div'); 
                    containerDiv.className = 'tradingview-widget-container';
                    const placeholder = document.createElement('div'); 
                    placeholder.className = 'tradingview-widget-container__widget';
                    containerDiv.appendChild(placeholder);

                    let groups = [], currentSymbols = [], currentName = "", groupCounter = 1;
                    
                    activeTabData.items.forEach(item => {
                        if (item.startsWith('---')) {
                            if (currentSymbols.length > 0) { groups.push({ "name": currentName, "symbols": currentSymbols }); currentSymbols = []; } 
                            else if (currentName !== "") { groups.push({ "name": currentName, "symbols": [] }); }
                            let rawName = item.replace('---', '').trim();
                            currentName = rawName !== "" ? rawName : ("\xA0" + "\u200B".repeat(groupCounter++));
                        } else { currentSymbols.push({ "name": item }); }
                    });
                    
                    if (currentSymbols.length > 0) groups.push({ "name": currentName, "symbols": currentSymbols });
                    else if (currentName !== "") groups.push({ "name": currentName, "symbols": [] });
                    if (groups.length === 0) groups.push({ "name": "\u200B".repeat(groupCounter++), "symbols": [] });

                    let totalSymbols = 0; groups.forEach(g => totalSymbols += g.symbols.length);
                    const dynamicHeight = (totalSymbols * 45 + groups.length * 40 + 65).toString();

                    const script = document.createElement('script');
                    script.type = 'text/javascript'; script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js'; script.async = true;
                    script.innerHTML = JSON.stringify({ "width": "100%", "height": dynamicHeight, "symbolsGroups": groups, "showSymbolLogo": false, "colorTheme": "dark", "isTransparent": true, "locale": "en" });

                    containerDiv.appendChild(script); 
                    widgetDiv.appendChild(containerDiv);
                    widgetWrap.appendChild(widgetDiv);
                }

                // 3. Bottom Input Bar
                const bottomBar = document.createElement('div');
                bottomBar.className = 'bottomInputBar';
                
                const inputEl = document.createElement('input');
                inputEl.type = 'text'; inputEl.className = 'colTickerInput'; 
                inputEl.placeholder = `Add to [${activeTabName}] (Press Enter)`;
                inputEl.onkeypress = (e) => handleTickerAdd(e, inputEl, activeTabName);

                const importWrap = document.createElement('div');
                importWrap.className = 'import-wrapper';
                const orSpan = document.createElement('span'); orSpan.innerText = 'Or';
                const batchBtn = document.createElement('button');
                batchBtn.className = 'bottom-btn'; batchBtn.innerText = 'Batch Import';
                batchBtn.onclick = () => openTabEditor(activeTabName);

                importWrap.appendChild(orSpan); importWrap.appendChild(batchBtn);
                bottomBar.appendChild(inputEl); bottomBar.appendChild(importWrap);

                // Assemble Column
                colDiv.appendChild(tabBar);
                colDiv.appendChild(widgetWrap);
                colDiv.appendChild(bottomBar);
                workspace.appendChild(colDiv);
            });
        }

        // --- TICKER ADDITION LOGIC ---
        function handleTickerAdd(e, inputElement, targetTabName) {
            if (e.key === 'Enter' && inputElement.value.trim()) {
                let newSymbol = inputElement.value.trim().toUpperCase();
                if (!newSymbol.includes(':') && !newSymbol.startsWith('---')) {
                    const found = popularTickers.find(t => t.symbol === newSymbol);
                    newSymbol = found ? `${found.exchange}:${found.symbol}` : `NASDAQ:${newSymbol}`;
                }

                insertItemsIntoTab(targetTabName, [newSymbol], true); // append mode
                inputElement.value = '';
            }
        }

        // Replaces or appends items to a specific tab without touching the rest of the array
        function insertItemsIntoTab(tabName, newItems, append = false) {
            if (myTickers.length === 0 || !myTickers[0].startsWith('===')) {
                myTickers.unshift("=== MAIN");
            }

            let newTickersArray = [];
            let inTargetTab = false;
            let targetFound = false;

            for (let i = 0; i < myTickers.length; i++) {
                if (myTickers[i].startsWith('===')) {
                    let curTab = myTickers[i].replace('===', '').trim();
                    if (curTab === tabName) {
                        inTargetTab = true;
                        targetFound = true;
                        newTickersArray.push(`=== ${tabName}`);
                        if (append) {
                            // Keep existing items, append at end
                            let j = i + 1;
                            while (j < myTickers.length && !myTickers[j].startsWith('===')) {
                                newTickersArray.push(myTickers[j]);
                                j++;
                            }
                            newTickersArray.push(...newItems);
                            i = j - 1; // Skip the items we just pushed
                        } else {
                            // Replace mode (Batch Import)
                            newTickersArray.push(...newItems);
                        }
                    } else {
                        inTargetTab = false;
                        newTickersArray.push(myTickers[i]);
                    }
                } else {
                    if (!inTargetTab) newTickersArray.push(myTickers[i]);
                }
            }

            if (!targetFound) {
                newTickersArray.push(`=== ${tabName}`);
                newTickersArray.push(...newItems);
            }

            myTickers = newTickersArray;
            saveLocalAndPush();
        }

        // --- TAB BATCH EDITOR ---
        function openTabEditor(tabName) {
            editingTabName = tabName;
            document.getElementById('tabEditorTitle').innerText = `BATCH IMPORT: [${tabName}]`;
            document.getElementById('tabEditor').value = getItemsForTab(tabName).join('\n');
            document.getElementById('tabEditorModal').classList.add('visible');
        }

        function closeTabEditor() { document.getElementById('tabEditorModal').classList.remove('visible'); }

        function saveTabEdit() {
            const rawText = document.getElementById('tabEditor').value;
            const newItems = rawText.split('\n').map(t => t.trim()).filter(t => t !== "");
            insertItemsIntoTab(editingTabName, newItems, false); // Replace mode
            closeTabEditor();
        }

        // --- MASTER BULK EDITOR ---
        function openMasterEditor() {
            document.getElementById('masterEditor').value = myTickers.join('\n');
            document.getElementById('masterEditorModal').classList.add('visible');
        }

        function closeMasterEditor() { document.getElementById('masterEditorModal').classList.remove('visible'); }

        function saveMasterEdit() {
            const rawText = document.getElementById('masterEditor').value;
            myTickers = rawText.split('\n').map(t => t.trim()).filter(t => t !== "");
            closeMasterEditor();
            saveLocalAndPush();
        }

        // --- JOURNAL LOGIC ---
        function toggleJournal() {
            const modal = document.getElementById('journalModal');
            modal.classList.toggle('visible');
            if(modal.classList.contains('visible')) { journalInput.focus(); }
        }

        journalInput.addEventListener('input', () => {
            myJournal = journalInput.value;
            saveLocalState();
            setStatus('TYPING...', 'status-working');
            clearTimeout(journalTimeout);
            journalTimeout = setTimeout(() => { autoPushToGist(); }, 1500); 
        });

        // --- INITIALIZATION ---
        window.onload = () => { 
            applyColorMode(); 
            if(myTickers.length === 0) myTickers = ["=== MAIN", "NASDAQ:AAPL", "NASDAQ:MSFT", "=== CRYPTO", "BINANCE:BTCUSDT"];
            renderApp(); 
            autoPullFromGist(); 
        };
    </script>
</body>
</html>
