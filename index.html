    <style>
        body {
            background-color: #000000;
            color: #555555;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            transition: background-color 0.3s;
        }

        /* --- SYNC BAR --- */
        #syncBar { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        
        .sync-btn { background: #0a0a0a; border: 1px solid #333; color: #555; font-family: 'Courier New', monospace; font-size: 11px; padding: 6px 12px; cursor: pointer; transition: all 0.2s; }
        .sync-btn:hover { border-color: #777; color: #999; }
        .sync-btn.highlight { border-color: #aaa; color: #aaa; }
        
        #syncStatus { font-size: 10px; letter-spacing: 1px; padding: 4px 10px; border-radius: 2px; }
        .status-ok { color: #4a7; } .status-err { color: #f44; font-weight: bold; } .status-working { color: #888; }
        
        #setupPanel { display: none; gap: 8px; margin-bottom: 15px; width: 100%; justify-content: center; }
        #setupPanel.visible { display: flex; }
        #setupPanel input { background: #111; border: 1px solid #333; color: #777; width: 150px; padding: 5px; font-size: 10px; font-family: 'Courier New', monospace; outline: none; }

        /* --- RAW BULK EDITOR --- */
        #rawEditorContainer { display: none; flex-direction: column; align-items: center; width: 100%; margin-bottom: 30px; }
        #rawEditorContainer.visible { display: flex; }
        textarea#rawEditor { background-color: #0a0a0a; color: #777; border: 1px solid #333; width: 100%; max-width: 600px; height: 350px; font-family: 'Courier New', monospace; padding: 15px; outline: none; resize: vertical; line-height: 1.5; }
        textarea#rawEditor:focus { border-color: #555; }

        /* --- DASHBOARD GRID --- */
        .dashboard-grid { display: grid; gap: 30px; grid-template-columns: 1fr; align-items: start; }
        @media (min-width: 800px) { .dashboard-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1200px) { .dashboard-grid { grid-template-columns: repeat(3, 1fr); } }

        .dashboard-card { display: flex; flex-direction: column; width: 100%; }
        
        .stealth-widget { filter: grayscale(100%) contrast(1.2); opacity: 0.7; transition: all 0.3s ease; width: 100%; }
        .stealth-widget:hover { opacity: 1; }

        /* --- FLOATING JOURNAL MODAL --- */
        #journalModal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 600px; background: #0a0a0a; border: 1px solid #333; z-index: 9000;
            flex-direction: column; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.95);
        }
        #journalModal.visible { display: flex; }
        .journal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px dashed #444; padding-bottom: 10px; }
        .journal-header span { color: #666; font-weight: bold; font-size: 11px; }
        .journal-header button { background: none; border: none; color: #555; cursor: pointer; font-family: monospace; transition: 0.2s; }
        .journal-header button:hover { color: #fff; }
        textarea#stealthJournal { background-color: transparent; border: none; color: #777; font-family: 'Courier New', monospace; width: 100%; height: 250px; outline: none; resize: vertical; line-height: 1.4; }
        textarea#stealthJournal:focus { color: #aaa; }

        /* --- COLOR MODE --- */
        body.color-mode .stealth-widget { filter: grayscale(0%) contrast(1); opacity: 1; }
    </style>
</head>
<body>

    <div id="syncBar">
        <button class="sync-btn" onclick="toggleSetup()">⚙ CONFIG</button>
        <button class="sync-btn" id="colorToggleBtn" onclick="toggleColors()">◑ COLOR</button>
        <button class="sync-btn highlight" onclick="toggleRawEdit()" id="bulkEditBtn">▤ BULK EDIT</button>
        <button class="sync-btn" onclick="toggleJournal()">⊟ NOTES</button>
        <span id="syncStatus" class="status-working">INITIALIZING...</span>
        
        <div id="setupPanel">
            <input type="password" id="tokenInput" placeholder="GitHub Token">
            <input type="text" id="gistIdInput" placeholder="Gist ID">
            <button class="sync-btn" onclick="saveCredentials()">SAVE</button>
        </div>
    </div>

    <div id="rawEditorContainer">
        <p style="font-size: 11px; margin-bottom: 10px; text-align: center;">Use <strong>--- Name</strong> for groups, <strong>=== Name</strong> for new columns. <br>Ex: NASDAQ:AAPL</p>
        <textarea id="rawEditor" spellcheck="false"></textarea>
        <div style="margin-top: 10px; gap: 10px; display: flex;">
            <button class="sync-btn highlight" onclick="saveRawEdit()">&#x1F4BE; SAVE &amp; REBUILD</button>
            <button class="sync-btn" onclick="toggleRawEdit()">&#x2612; CANCEL</button>
        </div>
    </div>

    <div id="mainDashboardArea">
        <div id="dashboard" class="dashboard-grid"></div>
    </div>

    <div id="journalModal">
        <div class="journal-header">
            <span>--- SECURE LOGS</span>
            <button onclick="toggleJournal()">[ X ]</button>
        </div>
        <textarea id="stealthJournal" placeholder="Log trades, ideas, or structural calculations here..."></textarea>
    </div>

    <script>
        let myTickers = [];
        let myJournal = "";
        const GIST_FILENAME = 'tickers.json';

        const dashboard = document.getElementById('dashboard');
        const journalInput = document.getElementById('stealthJournal');
        let journalTimeout;

        // --- LOCAL STORAGE LOAD ---
        try {
            const localData = JSON.parse(localStorage.getItem('stealthData'));
            if (localData && !Array.isArray(localData)) {
                myTickers = localData.tickers || [];
                myJournal = localData.journal || "";
            } else if (Array.isArray(localData)) {
                myTickers = localData;
            }
        } catch(e) {}
        
        journalInput.value = myJournal;

        // --- COLOR MODE ---
        let isColorMode = localStorage.getItem('colorMode') === 'true';
        function applyColorMode() {
            const btn = document.getElementById('colorToggleBtn');
            if (isColorMode) { document.body.classList.add('color-mode'); if(btn) btn.innerText = '◑ STEALTH'; }
            else { document.body.classList.remove('color-mode'); if(btn) btn.innerText = '◑ COLOR'; }
        }
        function toggleColors() { isColorMode = !isColorMode; localStorage.setItem('colorMode', isColorMode); applyColorMode(); }

        // --- SYNC CORE ---
        function setStatus(msg, className) { document.getElementById('syncStatus').textContent = msg; document.getElementById('syncStatus').className = className; }
        function getCreds() { return { token: localStorage.getItem('gistToken'), id: localStorage.getItem('gistId') }; }

        function toggleSetup() {
            const panel = document.getElementById('setupPanel');
            panel.classList.toggle('visible');
            if (panel.classList.contains('visible')) {
                const { token, id } = getCreds();
                document.getElementById('tokenInput').value = token || '';
                document.getElementById('gistIdInput').value = id || '';
            }
        }

        function saveCredentials() {
            localStorage.setItem('gistToken', document.getElementById('tokenInput').value.trim());
            localStorage.setItem('gistId', document.getElementById('gistIdInput').value.trim());
            document.getElementById('setupPanel').classList.remove('visible');
            autoPullFromGist();
        }

        async function autoPushToGist() {
            const { token, id } = getCreds();
            if (!token) return;
            setStatus('SAVING...', 'status-working');
            const payload = { tickers: myTickers, journal: myJournal };
            try {
                const res = await fetch(id ? `https://api.github.com/gists/${id}` : 'https://api.github.com/gists', {
                    method: id ? 'PATCH' : 'POST',
                    headers: { 'Authorization': `token ${token}` },
                    body: JSON.stringify({ public: false, files: { [GIST_FILENAME]: { content: JSON.stringify(payload) } } })
                });
                if (!id) localStorage.setItem('gistId', (await res.json()).id);
                setStatus('\u2713 SYNCED', 'status-ok');
            } catch (e) { setStatus('SYNC FAILED', 'status-err'); }
        }

        async function autoPullFromGist() {
            const { token, id } = getCreds();
            if (!token || !id) { setStatus('LOCAL MODE', 'status-working'); return; }
            setStatus('UPDATING...', 'status-working');
            try {
                const res = await fetch(`https://api.github.com/gists/${id}?t=${Date.now()}`, { headers: { 'Authorization': `token ${token}` } });
                const cloudContent = JSON.parse((await res.json()).files[GIST_FILENAME].content);
                if (Array.isArray(cloudContent)) {
                    myTickers = cloudContent;
                } else {
                    myTickers = cloudContent.tickers || [];
                    myJournal = cloudContent.journal || "";
                }
                localStorage.setItem('stealthData', JSON.stringify({ tickers: myTickers, journal: myJournal }));
                journalInput.value = myJournal;
                renderApp();
                setStatus('\u2713 SYNCED', 'status-ok');
            } catch (e) { setStatus('UPDATE FAILED', 'status-err'); }
        }

        // --- BULK RAW EDITOR ---
        function toggleRawEdit() {
            const editor = document.getElementById('rawEditorContainer');
            const main = document.getElementById('mainDashboardArea');
            const btn = document.getElementById('bulkEditBtn');
            if (editor.classList.contains('visible')) {
                editor.classList.remove('visible');
                main.style.display = 'block';
                btn.innerText = '\u25a4 BULK EDIT';
            } else {
                document.getElementById('rawEditor').value = myTickers.join('\n');
                editor.classList.add('visible');
                main.style.display = 'none';
                btn.innerText = '\u2612 CANCEL';
            }
        }

        function saveRawEdit() {
            myTickers = document.getElementById('rawEditor').value.split('\n').map(t => t.trim()).filter(t => t !== "");
            toggleRawEdit();
            saveLocalAndPush();
        }

        // --- JOURNAL LOGIC ---
        function toggleJournal() {
            const modal = document.getElementById('journalModal');
            modal.classList.toggle('visible');
            if(modal.classList.contains('visible')) { journalInput.focus(); }
        }

        journalInput.addEventListener('input', () => {
            myJournal = journalInput.value;
            localStorage.setItem('stealthData', JSON.stringify({ tickers: myTickers, journal: myJournal }));
            setStatus('TYPING...', 'status-working');
            clearTimeout(journalTimeout);
            journalTimeout = setTimeout(() => { autoPushToGist(); }, 1500);
        });

        function saveLocalAndPush() { localStorage.setItem('stealthData', JSON.stringify({ tickers: myTickers, journal: myJournal })); renderApp(); autoPushToGist(); }

        // --- TICKER LOGIC ---
        function getTickerChunks() {
            let chunks = [], currentChunk = [];
            myTickers.forEach((item) => {
                if (item.startsWith('===') && currentChunk.length > 0) { chunks.push(currentChunk); currentChunk = []; }
                currentChunk.push(item);
            });
            if (currentChunk.length > 0) chunks.push(currentChunk);
            return chunks;
        }

        // --- RENDER ---
        function renderApp() {
            dashboard.innerHTML = '';
            getTickerChunks().forEach(chunk => {
                const card = document.createElement('div');
                card.className = 'dashboard-card';
                const widgetDiv = document.createElement('div');
                widgetDiv.className = 'stealth-widget';
                const containerDiv = document.createElement('div');
                containerDiv.className = 'tradingview-widget-container';
                const placeholder = document.createElement('div');
                placeholder.className = 'tradingview-widget-container__widget';
                containerDiv.appendChild(placeholder);

                let groups = [], currentSymbols = [], currentName = "", groupCounter = 1;
                chunk.forEach(item => {
                    if (item.startsWith('===') || item.startsWith('---')) {
                        if (currentSymbols.length > 0) { groups.push({ "name": currentName, "symbols": currentSymbols }); currentSymbols = []; }
                        else if (currentName !== "") { groups.push({ "name": currentName, "symbols": [] }); }
                        let rawName = item.replace(/^[=-]+/, '').trim();
                        currentName = rawName !== "" ? rawName : ("\xA0" + "\u200B".repeat(groupCounter++));
                    } else { currentSymbols.push({ "name": item }); }
                });
                if (currentSymbols.length > 0) groups.push({ "name": currentName, "symbols": currentSymbols });
                else if (currentName !== "") groups.push({ "name": currentName, "symbols": [] });
                if (groups.length === 1 && groups[0].name !== "") groups.push({ "name": "\u200B".repeat(groupCounter++), "symbols": [] });

                let totalSymbols = 0;
                groups.forEach(g => totalSymbols += g.symbols.length);
                const dynamicHeight = (totalSymbols * 45 + groups.length * 40 + 65).toString();

                const script = document.createElement('script');
                script.type = 'text/javascript';
                script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js';
                script.async = true;
                script.innerHTML = JSON.stringify({ "width": "100%", "height": dynamicHeight, "symbolsGroups": groups, "showSymbolLogo": false, "colorTheme": "dark", "isTransparent": true, "locale": "en" });

                containerDiv.appendChild(script);
                widgetDiv.appendChild(containerDiv);
                card.appendChild(widgetDiv);
                dashboard.appendChild(card);
            });
        }

        window.onload = () => {
            applyColorMode();
            if (myTickers.length === 0) myTickers = ["=== MAIN", "NASDAQ:AAPL", "NASDAQ:MSFT", "=== CRYPTO", "BINANCE:BTCUSDT"];
            renderApp();
            autoPullFromGist();
        };
    </script>
</body>
</html>
