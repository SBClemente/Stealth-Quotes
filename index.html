<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=650">
    <title>Stealth Quotes</title>
    
    <link rel="icon" type="image/x-icon" href="hidden-eye-icon-diagonal-line-for-eye-vector.ico">
    <link rel="apple-touch-icon" href="hidden-eye-icon-diagonal-line-for-eye-vector.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="hidden-eye-icon-diagonal-line-for-eye-vector.ico">

    <style>
        body {
            background-color: #000000;
            color: #555555;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* --- SYNC BAR --- */
        #syncBar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .sync-btn {
            background: #0a0a0a;
            border: 1px solid #333;
            color: #555;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            padding: 6px 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .sync-btn:hover { border-color: #777; color: #999; }

        #syncStatus {
            font-size: 10px;
            letter-spacing: 1px;
            padding: 4px 10px;
            border-radius: 2px;
            transition: all 0.3s;
        }
        .status-ok { color: #4a7; }
        .status-warn { color: #ff9800; font-weight: bold; border: 1px solid #ff9800; }
        .status-err { color: #f44; font-weight: bold; }
        .status-working { color: #888; }

        #setupPanel { display: none; gap: 8px; margin-top: 10px; width: 100%; justify-content: center; }
        #setupPanel.visible { display: flex; }
        #setupPanel input { 
            background: #111; border: 1px solid #333; color: #777; 
            width: 150px; padding: 5px; font-size: 10px; 
        }

        /* --- DASHBOARD CONTROLS --- */
        .controls-container { margin-bottom: 30px; text-align: center; }
        input#tickerInput {
            background-color: #111;
            border: 1px solid #333;
            color: #777;
            padding: 12px;
            width: 350px;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: border-color 0.2s;
        }
        input#tickerInput:focus { border-color: #555; }

        /* --- STEALTH LIST (Text Rows) --- */
        #stealthList { display: flex; flex-direction: column; align-items: center; margin-bottom: 40px; }
        .stealth-row {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
            padding: 15px 0; border-bottom: 1px solid #1a1a1a; width: 100%; max-width: 1200px;
        }
        .stealth-row:last-child { border-bottom: none; }

        .invisible-item { 
            color: #333; font-size: 12px; cursor: grab; padding: 4px 8px; user-select: none; 
            transition: color 0.2s, transform 0.2s;
        }
        .invisible-item:active { cursor: grabbing; }
        .invisible-item:hover { color: #777; }
        .separator-item { color: #444; font-weight: bold; border-bottom: 1px solid #222; }

        .drag-over { border-left: 2px solid #555; opacity: 0.8; }

        /* --- CHARTS GRID (Max 3 Columns) --- */
        .dashboard-grid {
            display: grid; gap: 20px;
            grid-template-columns: 1fr;
        }
        @media (min-width: 768px) { .dashboard-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1100px) { .dashboard-grid { grid-template-columns: repeat(3, 1fr); } }

        .stealth-widget { filter: grayscale(100%) contrast(1.2); opacity: 0.7; transition: 0.3s; min-width: 0; }
        .stealth-widget:hover { opacity: 1; }
    </style>
</head>
<body>

    <div id="syncBar">
        <button class="sync-btn" onclick="toggleSetup()">⚙ config</button>
        <button class="sync-btn" id="pushBtn" onclick="pushToGist()">↑ PUSH</button>
        <button class="sync-btn" id="pullBtn" onclick="pullFromGist()">↓ PULL</button>
        <span id="syncStatus" class="status-working">INITIALIZING...</span>
        
        <div id="setupPanel">
            <input type="password" id="tokenInput" placeholder="GitHub Token">
            <input type="text" id="gistIdInput" placeholder="Gist ID">
            <button class="sync-btn" onclick="saveCredentials()">SAVE</button>
        </div>
    </div>

    <div class="controls-container">
        <input type="text" id="tickerInput" placeholder="Symbol or --- Name" autocomplete="off">
        <p style="font-size: 9px; color: #222; margin-top: 8px;">Drag to reorder. Double-tap to delete.</p>
    </div>

    <div id="stealthList"></div>
    <div id="dashboard" class="dashboard-grid"></div>

    <script>
        let myTickers = JSON.parse(localStorage.getItem('stealthTickers')) || [];
        const GIST_FILENAME = 'tickers.json';

        // --- SYNC CORE ---
        function setStatus(msg, className) {
            const el = document.getElementById('syncStatus');
            el.textContent = msg;
            el.className = className;
        }

        function getCreds() {
            return { token: localStorage.getItem('gistToken'), id: localStorage.getItem('gistId') };
        }

        function toggleSetup() {
            const panel = document.getElementById('setupPanel');
            panel.classList.toggle('visible');
            if (panel.classList.contains('visible')) {
                const { token, id } = getCreds();
                document.getElementById('tokenInput').value = token || '';
                document.getElementById('gistIdInput').value = id || '';
            }
        }

        function saveCredentials() {
            localStorage.setItem('gistToken', document.getElementById('tokenInput').value.trim());
            localStorage.setItem('gistId', document.getElementById('gistIdInput').value.trim());
            document.getElementById('setupPanel').classList.remove('visible');
            autoSync();
        }

        async function autoSync() {
            const { token, id } = getCreds();
            if (!token || !id) { setStatus('OFFLINE MODE', 'status-ok'); return; }
            setStatus('CHECKING CLOUD...', 'status-working');

            try {
                const res = await fetch(`https://api.github.com/gists/${id}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const data = await res.json();
                const cloudTickers = JSON.parse(data.files[GIST_FILENAME].content);
                const cloudStr = JSON.stringify(cloudTickers);
                const localStr = JSON.stringify(myTickers);

                if (localStr === cloudStr) {
                    setStatus('✓ SYNCED', 'status-ok');
                } else {
                    if (myTickers.length === 0) {
                        pullFromGist(true);
                    } else {
                        setStatus('⚠️ VERSIONS DIFFER', 'status-warn');
                    }
                }
            } catch (e) { setStatus('SYNC ERROR', 'status-err'); }
        }

        async function pushToGist() {
            const { token, id } = getCreds();
            if (!token) return toggleSetup();
            setStatus('PUSHING...', 'status-working');
            
            const content = JSON.stringify(myTickers);
            const url = id ? `https://api.github.com/gists/${id}` : 'https://api.github.com/gists';

            try {
                const res = await fetch(url, {
                    method: id ? 'PATCH' : 'POST',
                    headers: { 'Authorization': `token ${token}` },
                    body: JSON.stringify({ 
                        public: false, 
                        files: { [GIST_FILENAME]: { content } } 
                    })
                });
                if (!id) {
                    const data = await res.json();
                    localStorage.setItem('gistId', data.id);
                }
                setStatus('✓ PUSHED', 'status-ok');
            } catch (e) { setStatus('PUSH FAILED', 'status-err'); }
        }

        async function pullFromGist(isAuto = false) {
            const { token, id } = getCreds();
            if (!token || !id) return;
            if (!isAuto) setStatus('PULLING...', 'status-working');

            try {
                const res = await fetch(`https://api.github.com/gists/${id}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const data = await res.json();
                myTickers = JSON.parse(data.files[GIST_FILENAME].content);
                localStorage.setItem('stealthTickers', JSON.stringify(myTickers));
                renderApp();
                setStatus('✓ PULLED', 'status-ok');
            } catch (e) { if(!isAuto) setStatus('PULL FAILED', 'status-err'); }
        }

        // --- UI LOGIC ---
        function getTickerChunks() {
            let chunks = [], currentChunk = [];
            myTickers.forEach((item, index) => {
                currentChunk.push({ item: item, originalIndex: index });
                if (currentChunk.filter(i => !i.item.startsWith('---')).length >= 15) {
                    chunks.push(currentChunk); currentChunk = [];
                }
            });
            if (currentChunk.length > 0) chunks.push(currentChunk);
            return chunks;
        }

        function addTicker(tickerString) {
            if (!tickerString.startsWith('---') && !tickerString.includes(':')) {
                tickerString = `NASDAQ:${tickerString}`; // Default fallback
            }
            myTickers.push(tickerString);
            saveLocal();
        }

        function removeTicker(index) {
            myTickers.splice(index, 1);
            saveLocal();
        }

        function saveLocal() {
            localStorage.setItem('stealthTickers', JSON.stringify(myTickers));
            renderApp();
            setStatus('⚠️ UNPUSHED CHANGES', 'status-warn');
        }

        function renderApp() {
            renderStealthList();
            renderWidgets();
        }

        function renderStealthList() {
            stealthListContainer.innerHTML = '';
            getTickerChunks().forEach(chunk => {
                const row = document.createElement('div');
                row.className = 'stealth-row';
                chunk.forEach(data => {
                    const item = document.createElement('div');
                    item.className = 'invisible-item';
                    item.draggable = true;
                    if (data.item.startsWith('---')) {
                        let name = data.item.replace('---', '').trim();
                        item.innerText = name ? `--- ${name}` : '---';
                        item.classList.add('separator-item');
                    } else {
                        item.innerText = data.item.split(':')[1] || data.item;
                    }
                    
                    // Drag & Drop
                    item.ondragstart = (e) => { e.dataTransfer.setData('text', data.originalIndex); item.style.opacity = '0.4'; };
                    item.ondragend = () => { item.style.opacity = '1'; document.querySelectorAll('.invisible-item').forEach(el => el.classList.remove('drag-over')); };
                    item.ondragover = (e) => { e.preventDefault(); item.classList.add('drag-over'); };
                    item.ondragleave = () => item.classList.remove('drag-over');
                    item.ondrop = (e) => {
                        e.preventDefault();
                        const fromIdx = parseInt(e.dataTransfer.getData('text'));
                        const toIdx = data.originalIndex;
                        const moved = myTickers.splice(fromIdx, 1)[0];
                        myTickers.splice(toIdx, 0, moved);
                        saveLocal();
                    };

                    item.ondblclick = () => removeTicker(data.originalIndex);
                    row.appendChild(item);
                });
                stealthListContainer.appendChild(row);
            });
        }

        function renderWidgets() {
            dashboard.innerHTML = '';
            getTickerChunks().forEach(chunk => {
                const widgetDiv = document.createElement('div');
                widgetDiv.className = 'stealth-widget';
                const container = document.createElement('div');
                container.className = 'tradingview-widget-container';
                const placeholder = document.createElement('div');
                placeholder.className = 'tradingview-widget-container__widget';
                container.appendChild(placeholder);

                let groups = [], currentSymbols = [], currentName = "", gCounter = 1;
                chunk.forEach(obj => {
                    if (obj.item.startsWith('---')) {
                        if (currentSymbols.length > 0) groups.push({ name: currentName, symbols: currentSymbols });
                        currentSymbols = [];
                        let rawName = obj.item.replace('---', '').trim();
                        currentName = rawName !== "" ? rawName : ("\xA0" + "\u200B".repeat(gCounter++));
                    } else { currentSymbols.push({ name: obj.item }); }
                });
                if (currentSymbols.length > 0) groups.push({ name: currentName, symbols: currentSymbols });
                if (groups.length === 1 && groups[0].name !== "") groups.push({ name: "\u200B".repeat(gCounter++), symbols: [] });

                const script = document.createElement('script');
                script.type = 'text/javascript';
                script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js';
                script.async = true;
                script.innerHTML = JSON.stringify({
                    "width": "100%", "height": (groups.reduce((a,b)=>a+b.symbols.length,0)*45+groups.length*40+65),
                    "symbolsGroups": groups, "showSymbolLogo": false, "colorTheme": "dark", "isTransparent": true, "locale": "en"
                });
                container.appendChild(script);
                widgetDiv.appendChild(container);
                dashboard.appendChild(widgetDiv);
            });
        }

        inputField.onkeypress = (e) => { if(e.key === 'Enter' && inputField.value.trim()){ addTicker(inputField.value.trim().toUpperCase()); inputField.value = ''; }};
        
        window.onload = () => { autoSync(); renderApp(); };
    </script>
</body>
</html>
