<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stealth Monitor</title>
    
    <link rel="icon" type="image/x-icon" href="hidden-eye-icon-diagonal-line-for-eye-vector.ico">
    <link rel="apple-touch-icon" href="hidden-eye-icon-diagonal-line-for-eye-vector.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="hidden-eye-icon-diagonal-line-for-eye-vector.ico">

    <style>
        body { background-color: #000000; color: #555555; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 0; overflow-x: hidden; transition: background-color 0.3s; }

        /* --- SYNC & TOP BAR --- */
        #syncBar { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 15px 10px; background-color: rgba(0, 0, 0, 0.95); border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 8000; flex-wrap: wrap; }
        .sync-btn { background: #050505; border: 1px solid #333; color: #666; font-family: 'Courier New', monospace; font-size: 12px; padding: 10px 14px; cursor: pointer; transition: all 0.2s; }
        .sync-btn:hover { border-color: #888; color: #aaa; background: #111; }
        .sync-btn.highlight { border-color: #aaa; color: #aaa; }
        #syncStatus { font-size: 11px; letter-spacing: 1px; padding: 4px 10px; border-radius: 2px; }
        .status-ok { color: #4a7; } .status-err { color: #f44; font-weight: bold; } .status-working { color: #888; }
        #setupPanel { display: none; gap: 8px; width: 100%; justify-content: center; padding-top: 10px; }
        #setupPanel.visible { display: flex; }
        #setupPanel input { background: #111; border: 1px solid #333; color: #777; width: 150px; padding: 8px; font-size: 11px; font-family: 'Courier New', monospace; outline: none; }

        /* --- MAIN WORKSPACE --- */
        #workspaceWrapper { width: 100%; padding: 20px; box-sizing: border-box; overflow-x: auto; }
        #workspaceWrapper::-webkit-scrollbar { height: 6px; } #workspaceWrapper::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        #workspace { display: flex; gap: 20px; align-items: flex-start; justify-content: flex-start; min-width: max-content; }
        .column-container { width: 450px; flex-shrink: 0; display: flex; flex-direction: column; border: 1px solid #222; background-color: #050505; }

        /* TABS */
        .tabBar { display: flex; overflow-x: auto; border-bottom: 1px solid #222; background-color: #020202; align-items: center; }
        .tabBar::-webkit-scrollbar { height: 0px; } 
        .tab-btn { background: transparent; color: #555; border: none; padding: 12px 14px; cursor: pointer; font-family: 'Courier New', monospace; font-size: 12px; border-bottom: 2px solid transparent; white-space: nowrap; transition: 0.2s; outline: none; }
        .tab-btn:hover { color: #888; background: #0a0a0a; }
        .tab-btn.active { color: #bbb; border-bottom: 2px solid #555; background: #0a0a0a; }
        
        .tab-controls { display: flex; margin-left: auto; padding-right: 5px; gap: 5px; align-items: center; }
        .icon-btn { background: transparent; border: none; color: #444; cursor: pointer; font-family: monospace; font-size: 14px; padding: 8px; transition: 0.2s; }
        .icon-btn:hover { color: #aaa; }
        
        /* INLINE TAB INPUT */
        .inline-tab-input { background: transparent; color: #aaa; border: none; border-bottom: 1px solid #555; font-family: 'Courier New', monospace; font-size: 12px; width: 80px; outline: none; padding: 4px; margin: 0 5px; display: none; }

        /* WIDGET & BOTTOM BAR */
        .widgetContainer { min-height: 200px; width: 100%; }
        .stealth-widget { filter: grayscale(100%) contrast(1.2); opacity: 0.7; transition: all 0.3s ease; width: 100%; }
        .stealth-widget:hover { opacity: 1; }
        
        .bottomInputBar { display: flex; border-top: 1px solid #222; background-color: #0a0a0a; padding: 5px 10px; align-items: center; position: relative; }
        .colTickerInput { flex-grow: 1; background: transparent; border: none; color: #777; font-family: 'Courier New', monospace; font-size: 12px; outline: none; padding: 10px 8px; }
        .import-wrapper { display: flex; align-items: center; gap: 8px; border-left: 1px solid #222; padding-left: 10px; }
        .import-wrapper span { color: #444; font-size: 11px; }
        .bottom-btn { background: transparent; border: 1px solid #333; color: #777; font-family: 'Courier New', monospace; font-size: 11px; padding: 6px 10px; cursor: pointer; transition: 0.2s; }
        .bottom-btn:hover { color: #aaa; border-color: #555; }

        /* SMART LIVE DROPDOWN MENU */
        .suggestions-box { position: absolute; bottom: 100%; left: 0; right: 0; background-color: #050505; border: 1px solid #333; border-bottom: none; max-height: 250px; overflow-y: auto; z-index: 1000; display: none; text-align: left; box-shadow: 0px -5px 15px rgba(0,0,0,0.9); }
        .suggestions-box::-webkit-scrollbar { width: 4px; } .suggestions-box::-webkit-scrollbar-thumb { background: #444; }
        .suggestion-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; }
        .suggestion-item:hover { background-color: #111; }
        .sugg-text-col { display: flex; flex-direction: column; }
        .sugg-symbol { color: #aaa; font-weight: bold; font-size: 12px; }
        .sugg-name { color: #555; font-size: 10px; margin-top: 2px; }
        .sugg-exchange { font-size: 10px; color: #444; font-weight: bold; }

        /* MODALS */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0,0,0,0.95); z-index: 9000; flex-direction: column; align-items: center; justify-content: center; }
        .modal-overlay.visible { display: flex; }
        .editor-content { background: #050505; border: 1px solid #333; padding: 20px; width: 95%; max-width: 600px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.95); }
        .editor-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #333; padding-bottom: 10px; margin-bottom: 10px; }
        .editor-header span { color: #888; font-weight: bold; font-size: 12px; }
        textarea.stealth-textarea { background-color: #0a0a0a; color: #777; border: 1px solid #222; width: 100%; height: 350px; font-family: 'Courier New', monospace; padding: 15px; outline: none; resize: vertical; line-height: 1.5; box-sizing: border-box; font-size: 13px; }
        textarea.stealth-textarea:focus { border-color: #444; }
        .editor-actions { display: flex; justify-content: space-between; margin-top: 10px; }

        @media (max-width: 768px) {
            #workspace { flex-direction: column; min-width: 100%; }
            .column-container { width: 100%; flex-shrink: 1; margin-bottom: 20px; }
            #workspaceWrapper { padding: 10px; }
        }

        body.color-mode .stealth-widget { filter: grayscale(0%) contrast(1); opacity: 1; }
    </style>
</head>
<body>

    <div id="syncBar">
        <button class="sync-btn" onclick="toggleSetup()">⚙ CONFIG</button>
        <button class="sync-btn" id="colorToggleBtn" onclick="toggleColors()">◑ COLOR</button>
        <button class="sync-btn" onclick="addColumn()">⊞ NEW COLUMN</button>
        <button class="sync-btn" onclick="openMasterEditor()">▤ MASTER BULK</button>
        <button class="sync-btn" onclick="toggleJournal()">⊟ NOTES</button>
        <span id="syncStatus" class="status-working">INITIALIZING...</span>
        
        <div id="setupPanel">
            <input type="password" id="tokenInput" placeholder="GitHub Token">
            <input type="text" id="gistIdInput" placeholder="Gist ID">
            <button class="sync-btn" onclick="saveCredentials()">SAVE</button>
        </div>
    </div>

    <div id="workspaceWrapper">
        <div id="workspace"></div>
    </div>

    <div id="tabEditorModal" class="modal-overlay">
        <div class="editor-content">
            <div class="editor-header">
                <span id="tabEditorTitle">BATCH IMPORT</span>
                <span style="font-size: 10px; color: #555;">Use --- GroupName for dividers</span>
            </div>
            <textarea id="tabEditor" class="stealth-textarea" spellcheck="false"></textarea>
            <div class="editor-actions">
                <button class="bottom-btn" onclick="closeTabEditor()">[X] CANCEL</button>
                <button class="bottom-btn" style="border-color: #555; color: #aaa;" onclick="saveTabEdit()">[+] SAVE TAB</button>
            </div>
        </div>
    </div>

    <div id="masterEditorModal" class="modal-overlay">
        <div class="editor-content">
            <div class="editor-header">
                <span>MASTER RAW EDIT (ALL TABS)</span>
                <span style="font-size: 10px; color: #555;">Use === TabName for new tabs</span>
            </div>
            <textarea id="masterEditor" class="stealth-textarea" spellcheck="false"></textarea>
            <div class="editor-actions">
                <button class="bottom-btn" onclick="closeMasterEditor()">[X] CANCEL</button>
                <button class="bottom-btn" style="border-color: #555; color: #aaa;" onclick="saveMasterEdit()">[+] OVERWRITE ALL</button>
            </div>
        </div>
    </div>

    <div id="journalModal" class="modal-overlay">
        <div class="editor-content" style="height: auto;">
            <div class="editor-header">
                <span>--- SECURE LOGS</span>
                <button class="icon-btn" onclick="toggleJournal()">[X]</button>
            </div>
            <textarea id="stealthJournal" class="stealth-textarea" style="height: 250px;" placeholder="Log ideas or structural calculations here..."></textarea>
        </div>
    </div>

    <script>
        let myTickers = [];
        let myJournal = "";
        let columnsState = ["MAIN"]; 
        let editingTabName = ""; 
        let searchTimeout;
        const GIST_FILENAME = 'tickers.json';

        const workspace = document.getElementById('workspace');
        const journalInput = document.getElementById('stealthJournal');
        let journalTimeout;

        // --- LOCAL STORAGE LOAD ---
        try {
            const localData = JSON.parse(localStorage.getItem('stealthData'));
            if (localData && !Array.isArray(localData)) {
                myTickers = localData.tickers || [];
                myJournal = localData.journal || "";
            } else if (Array.isArray(localData)) { myTickers = localData; }
            const localCols = JSON.parse(localStorage.getItem('stealthCols'));
            if (localCols && Array.isArray(localCols) && localCols.length > 0) { columnsState = localCols; }
        } catch(e) {}
        journalInput.value = myJournal;

        // --- COLOR MODE ---
        let isColorMode = localStorage.getItem('colorMode') === 'true';
        function applyColorMode() {
            const btn = document.getElementById('colorToggleBtn');
            if (isColorMode) { document.body.classList.add('color-mode'); if(btn) btn.innerText = '◑ STEALTH'; } 
            else { document.body.classList.remove('color-mode'); if(btn) btn.innerText = '◑ COLOR'; }
        }
        function toggleColors() { isColorMode = !isColorMode; localStorage.setItem('colorMode', isColorMode); applyColorMode(); }

        // --- SYNC CORE ---
        function setStatus(msg, className) { document.getElementById('syncStatus').textContent = msg; document.getElementById('syncStatus').className = className; }
        function getCreds() { return { token: localStorage.getItem('gistToken'), id: localStorage.getItem('gistId') }; }
        function toggleSetup() { document.getElementById('setupPanel').classList.toggle('visible'); }

        function saveCredentials() {
            localStorage.setItem('gistToken', document.getElementById('tokenInput').value.trim());
            localStorage.setItem('gistId', document.getElementById('gistIdInput').value.trim());
            document.getElementById('setupPanel').classList.remove('visible');
            autoPullFromGist(); 
        }

        async function autoPushToGist() {
            const { token, id } = getCreds();
            if (!token) return; 
            setStatus('SAVING...', 'status-working');
            try {
                const res = await fetch(id ? `https://api.github.com/gists/${id}` : 'https://api.github.com/gists', {
                    method: id ? 'PATCH' : 'POST', headers: { 'Authorization': `token ${token}` },
                    body: JSON.stringify({ public: false, files: { [GIST_FILENAME]: { content: JSON.stringify({ tickers: myTickers, journal: myJournal }) } } })
                });
                if (!id) localStorage.setItem('gistId', (await res.json()).id);
                setStatus('✓ SYNCED', 'status-ok');
            } catch (e) { setStatus('SYNC FAILED', 'status-err'); }
        }

        async function autoPullFromGist() {
            const { token, id } = getCreds();
            if (!token || !id) { setStatus('LOCAL MODE', 'status-working'); return; }
            setStatus('UPDATING...', 'status-working');
            try {
                const res = await fetch(`https://api.github.com/gists/${id}?t=${Date.now()}`, { headers: { 'Authorization': `token ${token}` } });
                const cloudContent = JSON.parse((await res.json()).files[GIST_FILENAME].content);
                if (Array.isArray(cloudContent)) { myTickers = cloudContent; } else { myTickers = cloudContent.tickers || []; myJournal = cloudContent.journal || ""; }
                saveLocalState(); journalInput.value = myJournal; renderApp(); setStatus('✓ SYNCED', 'status-ok');
            } catch (e) { setStatus('UPDATE FAILED', 'status-err'); }
        }

        function saveLocalState() {
            localStorage.setItem('stealthData', JSON.stringify({ tickers: myTickers, journal: myJournal }));
            localStorage.setItem('stealthCols', JSON.stringify(columnsState));
        }
        function saveLocalAndPush() { saveLocalState(); renderApp(); autoPushToGist(); }

        // --- DATA PARSING ---
        function getParsedTabs() {
            let tabs = []; let currentTab = null;
            myTickers.forEach(item => {
                if (item.startsWith('===')) {
                    if (currentTab) tabs.push(currentTab);
                    currentTab = { name: item.replace('===', '').trim() || "UNNAMED", items: [] };
                } else {
                    if (!currentTab) currentTab = { name: "MAIN", items: [] };
                    currentTab.items.push(item);
                }
            });
            if (currentTab) tabs.push(currentTab);
            if (tabs.length === 0) tabs.push({ name: "MAIN", items: [] });
            return tabs;
        }

        function getItemsForTab(tabName) {
            const tabs = getParsedTabs();
            const tab = tabs.find(t => t.name === tabName);
            return tab ? tab.items : [];
        }

        // --- MULTI-COLUMN UI RENDERING ---
        function addColumn() { const tabs = getParsedTabs(); columnsState.push(tabs[0].name); saveLocalState(); renderApp(); }
        function removeColumn(index) { columnsState.splice(index, 1); if(columnsState.length === 0) columnsState = ["MAIN"]; saveLocalState(); renderApp(); }
        function switchColumnTab(colIndex, tabName) { columnsState[colIndex] = tabName; saveLocalState(); renderApp(); }

        function renderApp() {
            const tabs = getParsedTabs();
            workspace.innerHTML = '';
            columnsState = columnsState.map(colTab => tabs.find(t => t.name === colTab) ? colTab : tabs[0].name);

            columnsState.forEach((activeTabName, colIndex) => {
                const colDiv = document.createElement('div'); colDiv.className = 'column-container';

                // 1. Tab Bar
                const tabBar = document.createElement('div'); tabBar.className = 'tabBar';
                tabs.forEach(tab => {
                    const btn = document.createElement('button');
                    btn.className = `tab-btn ${tab.name === activeTabName ? 'active' : ''}`;
                    btn.innerText = `[ ${tab.name} ]`;
                    btn.onclick = () => switchColumnTab(colIndex, tab.name);
                    tabBar.appendChild(btn);
                });

                const tabControls = document.createElement('div'); tabControls.className = 'tab-controls';
                
                // INLINE TAB ADDING
                const addTabBtn = document.createElement('button'); addTabBtn.className = 'icon-btn'; addTabBtn.innerText = '[+]'; 
                const inlineInput = document.createElement('input'); inlineInput.type = 'text'; inlineInput.className = 'inline-tab-input'; inlineInput.placeholder = 'Name...';
                
                const processInlineTab = () => {
                    const newName = inlineInput.value.trim().toUpperCase();
                    if (newName) {
                        myTickers.push(`=== ${newName}`);
                        switchColumnTab(colIndex, newName);
                        saveLocalAndPush();
                    } else {
                        renderApp(); // Reset UI if empty
                    }
                };

                addTabBtn.onclick = () => {
                    addTabBtn.style.display = 'none';
                    inlineInput.style.display = 'inline-block';
                    inlineInput.focus();
                };

                inlineInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') processInlineTab(); });
                inlineInput.addEventListener('blur', () => processInlineTab());

                const closeColBtn = document.createElement('button'); closeColBtn.className = 'icon-btn'; closeColBtn.innerText = '[X]'; 
                closeColBtn.onclick = () => removeColumn(colIndex);

                tabControls.appendChild(addTabBtn); 
                tabControls.appendChild(inlineInput);
                if (columnsState.length > 1) tabControls.appendChild(closeColBtn); 
                tabBar.appendChild(tabControls);

                // 2. Widget Container
                const widgetWrap = document.createElement('div'); widgetWrap.className = 'widgetContainer';
                const activeTabData = tabs.find(t => t.name === activeTabName);
                if (activeTabData) {
                    const widgetDiv = document.createElement('div'); widgetDiv.className = 'stealth-widget';
                    const containerDiv = document.createElement('div'); containerDiv.className = 'tradingview-widget-container';
                    const placeholder = document.createElement('div'); placeholder.className = 'tradingview-widget-container__widget';
                    containerDiv.appendChild(placeholder);

                    let groups = [], currentSymbols = [], currentName = "", groupCounter = 1;
                    activeTabData.items.forEach(item => {
                        if (item.startsWith('---')) {
                            if (currentSymbols.length > 0) { groups.push({ "name": currentName, "symbols": currentSymbols }); currentSymbols = []; } 
                            else if (currentName !== "") { groups.push({ "name": currentName, "symbols": [] }); }
                            let rawName = item.replace('---', '').trim(); currentName = rawName !== "" ? rawName : ("\xA0" + "\u200B".repeat(groupCounter++));
                        } else { currentSymbols.push({ "name": item }); }
                    });
                    if (currentSymbols.length > 0) groups.push({ "name": currentName, "symbols": currentSymbols });
                    else if (currentName !== "") groups.push({ "name": currentName, "symbols": [] });
                    if (groups.length === 0) groups.push({ "name": "\u200B".repeat(groupCounter++), "symbols": [] });

                    let totalSymbols = 0; groups.forEach(g => totalSymbols += g.symbols.length);
                    const dynamicHeight = (totalSymbols * 45 + groups.length * 40 + 65).toString();

                    const script = document.createElement('script');
                    script.type = 'text/javascript'; script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js'; script.async = true;
                    script.innerHTML = JSON.stringify({ "width": "100%", "height": dynamicHeight, "symbolsGroups": groups, "showSymbolLogo": false, "colorTheme": "dark", "isTransparent": false, "backgroundColor": "#050505", "locale": "en" });

                    containerDiv.appendChild(script); widgetDiv.appendChild(containerDiv); widgetWrap.appendChild(widgetDiv);
                }

                // 3. Bottom Input Bar & LIVE PROXY DROPDOWN
                const bottomBar = document.createElement('div'); bottomBar.className = 'bottomInputBar';
                
                const inputWrap = document.createElement('div'); inputWrap.style.position = 'relative'; inputWrap.style.flexGrow = '1';
                const inputEl = document.createElement('input'); inputEl.type = 'text'; inputEl.className = 'colTickerInput'; inputEl.placeholder = `Search TradingView...`;
                
                const suggBox = document.createElement('div'); suggBox.className = 'suggestions-box';
                
                function renderSuggItem(symbol, name, exchange) {
                    const div = document.createElement('div'); div.className = 'suggestion-item';
                    const fullTicker = exchange ? `${exchange}:${symbol}` : symbol;
                    div.innerHTML = `
                        <div class="sugg-text-col" style="max-width: 75%;">
                            <span class="sugg-symbol">${symbol}</span>
                            <span class="sugg-name" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${name || ''}</span>
                        </div>
                        <span class="sugg-exchange" style="text-align: right;">${exchange}</span>
                    `;
                    div.onclick = () => { insertItemsIntoTab(activeTabName, [fullTicker], true); suggBox.style.display = 'none'; inputEl.value = ''; };
                    suggBox.appendChild(div);
                }

                inputEl.addEventListener('input', function() {
                    const query = this.value.trim().toUpperCase();
                    suggBox.innerHTML = '';
                    
                    if (!query || query.startsWith('-') || query.startsWith('=')) { 
                        suggBox.style.display = 'none'; 
                        return; 
                    }

                    clearTimeout(searchTimeout);
                    searchTimeout = setTimeout(async () => {
                        try {
                            const targetUrl = `https://symbol-search.tradingview.com/symbol_search/?text=${encodeURIComponent(query)}`;
                            const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;
                            
                            const res = await fetch(proxyUrl);
                            if (!res.ok) throw new Error('Proxy failed');
                            const proxyMatches = await res.json();
                            
                            if (proxyMatches && proxyMatches.length > 0) {
                                suggBox.innerHTML = ''; 
                                suggBox.style.display = 'block';
                                proxyMatches.slice(0, 10).forEach(match => {
                                    const exchange = match.exchange || match.prefix || "";
                                    renderSuggItem(match.symbol, match.description, exchange);
                                });
                            } else {
                                suggBox.style.display = 'block';
                                const div = document.createElement('div'); div.className = 'suggestion-item';
                                div.innerHTML = `<div class="sugg-text-col"><span class="sugg-symbol">Add manually:</span></div><span class="sugg-exchange">${query}</span>`;
                                div.onclick = () => { insertItemsIntoTab(activeTabName, [query], true); suggBox.style.display = 'none'; inputEl.value = ''; };
                                suggBox.appendChild(div);
                            }
                        } catch(e) {
                            suggBox.style.display = 'block';
                            const div = document.createElement('div'); div.className = 'suggestion-item';
                            div.innerHTML = `<div class="sugg-text-col"><span class="sugg-symbol">Add manually (Offline):</span></div><span class="sugg-exchange">${query}</span>`;
                            div.onclick = () => { insertItemsIntoTab(activeTabName, [query], true); suggBox.style.display = 'none'; inputEl.value = ''; };
                            suggBox.appendChild(div);
                        }
                    }, 400); 
                });

                inputEl.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter' && inputEl.value.trim()) {
                        let val = inputEl.value.trim().toUpperCase();
                        insertItemsIntoTab(activeTabName, [val], true); 
                        inputEl.value = ''; suggBox.style.display = 'none';
                    }
                });

                document.addEventListener('click', (e) => { if (e.target !== inputEl) suggBox.style.display = 'none'; });

                const importWrap = document.createElement('div'); importWrap.className = 'import-wrapper';
                const orSpan = document.createElement('span'); orSpan.innerText = 'Or';
                const batchBtn = document.createElement('button'); batchBtn.className = 'bottom-btn'; batchBtn.innerText = 'Batch Import';
                batchBtn.onclick = () => openTabEditor(activeTabName);

                inputWrap.appendChild(inputEl); inputWrap.appendChild(suggBox);
                importWrap.appendChild(orSpan); importWrap.appendChild(batchBtn);
                bottomBar.appendChild(inputWrap); bottomBar.appendChild(importWrap);

                colDiv.appendChild(tabBar); colDiv.appendChild(widgetWrap); colDiv.appendChild(bottomBar);
                workspace.appendChild(colDiv);
            });
        }

        // --- TICKER INSERTION ---
        function insertItemsIntoTab(tabName, newItems, append = false) {
            if (myTickers.length === 0 || !myTickers[0].startsWith('===')) { myTickers.unshift("=== MAIN"); }
            let newTickersArray = []; let inTargetTab = false; let targetFound = false;

            for (let i = 0; i < myTickers.length; i++) {
                if (myTickers[i].startsWith('===')) {
                    let curTab = myTickers[i].replace('===', '').trim();
                    if (curTab === tabName) {
                        inTargetTab = true; targetFound = true; newTickersArray.push(`=== ${tabName}`);
                        if (append) {
                            let j = i + 1; while (j < myTickers.length && !myTickers[j].startsWith('===')) { newTickersArray.push(myTickers[j]); j++; }
                            newTickersArray.push(...newItems); i = j - 1; 
                        } else { newTickersArray.push(...newItems); }
                    } else { inTargetTab = false; newTickersArray.push(myTickers[i]); }
                } else { if (!inTargetTab) newTickersArray.push(myTickers[i]); }
            }

            if (!targetFound) { newTickersArray.push(`=== ${tabName}`); newTickersArray.push(...newItems); }
            myTickers = newTickersArray; saveLocalAndPush();
        }

        // --- MODAL CONTROLS ---
        function openTabEditor(tabName) { editingTabName = tabName; document.getElementById('tabEditorTitle').innerText = `BATCH IMPORT: [${tabName}]`; document.getElementById('tabEditor').value = getItemsForTab(tabName).join('\n'); document.getElementById('tabEditorModal').classList.add('visible'); }
        function closeTabEditor() { document.getElementById('tabEditorModal').classList.remove('visible'); }
        function saveTabEdit() { const rawText = document.getElementById('tabEditor').value; const newItems = rawText.split('\n').map(t => t.trim()).filter(t => t !== ""); insertItemsIntoTab(editingTabName, newItems, false); closeTabEditor(); }

        function openMasterEditor() { document.getElementById('masterEditor').value = myTickers.join('\n'); document.getElementById('masterEditorModal').classList.add('visible'); }
        function closeMasterEditor() { document.getElementById('masterEditorModal').classList.remove('visible'); }
        function saveMasterEdit() { const rawText = document.getElementById('masterEditor').value; myTickers = rawText.split('\n').map(t => t.trim()).filter(t => t !== ""); closeMasterEditor(); saveLocalAndPush(); }

        function toggleJournal() { const modal = document.getElementById('journalModal'); modal.classList.toggle('visible'); if(modal.classList.contains('visible')) { journalInput.focus(); } }

        window.onload = () => { applyColorMode(); if(myTickers.length === 0) myTickers = ["=== MAIN", "NASDAQ:AAPL", "NASDAQ:MSFT", "=== CRYPTO", "BINANCE:BTCUSDT"]; renderApp(); autoPullFromGist(); };
    </script>
</body>
</html>
