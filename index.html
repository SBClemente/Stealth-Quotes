<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=650">
    <title>Stealth Quotes</title>
    
    <link rel="icon" type="image/x-icon" href="hidden-eye-icon-diagonal-line-for-eye-vector.ico">
    <link rel="apple-touch-icon" href="hidden-eye-icon-diagonal-line-for-eye-vector.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="hidden-eye-icon-diagonal-line-for-eye-vector.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="hidden-eye-icon-diagonal-line-for-eye-vector.ico">

    <style>
        body {
            background-color: #000000;
            color: #555555;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            transition: background-color 0.3s;
        }

        /* --- SYNC BAR --- */
        #syncBar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .sync-btn {
            background: #0a0a0a;
            border: 1px solid #333;
            color: #555;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            padding: 6px 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .sync-btn:hover { border-color: #777; color: #999; }

        #syncStatus {
            font-size: 10px;
            letter-spacing: 1px;
            padding: 4px 10px;
            border-radius: 2px;
            transition: all 0.3s;
        }
        .status-ok { color: #4a7; }
        .status-err { color: #f44; font-weight: bold; }
        .status-working { color: #888; }

        #setupPanel { display: none; gap: 8px; margin-top: 10px; width: 100%; justify-content: center; }
        #setupPanel.visible { display: flex; }
        #setupPanel input { 
            background: #111; border: 1px solid #333; color: #777; 
            width: 150px; padding: 5px; font-size: 10px; 
            font-family: 'Courier New', monospace; outline: none;
        }

        /* --- DASHBOARD CONTROLS & DROPDOWN --- */
        .controls-container { margin-bottom: 30px; text-align: center; }
        
        .autocomplete-wrapper {
            display: inline-block;
            position: relative;
        }

        input#tickerInput {
            background-color: #111;
            border: 1px solid #333;
            color: #777;
            padding: 12px;
            width: 350px;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: border-color 0.2s;
        }
        input#tickerInput:focus { border-color: #555; }

        #suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background-color: #0a0a0a;
            border: 1px solid #222;
            border-top: none;
            max-height: 250px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            text-align: left;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.8);
        }
        #suggestions::-webkit-scrollbar { width: 4px; }
        #suggestions::-webkit-scrollbar-thumb { background: #333; }

        .suggestion-item {
            padding: 10px 15px;
            cursor: pointer;
            border-bottom: 1px solid #111;
            display: flex;
            justify-content: space-between;
        }
        .suggestion-item:hover { background-color: #1a1a1a; color: #999; }
        .sugg-exchange { font-size: 10px; color: #444; }

        /* --- STEALTH LIST (Text Rows) --- */
        #stealthList { display: flex; flex-direction: column; align-items: center; margin-bottom: 40px; }
        .stealth-row {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;
            padding: 15px 0; border-bottom: 1px solid #1a1a1a; width: 100%; max-width: 1200px;
        }
        .stealth-row:last-child { border-bottom: none; }

        .invisible-item { 
            color: #333; font-size: 12px; cursor: grab; padding: 4px 8px; user-select: none; 
            transition: color 0.2s, transform 0.2s;
        }
        .invisible-item:active { cursor: grabbing; }
        .invisible-item:hover { color: #777; }
        .separator-item { color: #444; font-weight: bold; border-bottom: 1px solid #222; }

        .drag-over { border-left: 2px solid #555; opacity: 0.8; }

        /* --- CHARTS GRID --- */
        .dashboard-grid {
            display: grid; gap: 20px;
            grid-template-columns: 1fr;
        }
        @media (min-width: 768px) { .dashboard-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1100px) { .dashboard-grid { grid-template-columns: repeat(3, 1fr); } }

        .stealth-widget { 
            filter: grayscale(100%) contrast(1.2); 
            opacity: 0.7; 
            transition: all 0.3s ease; 
            min-width: 0; 
        }
        .stealth-widget:hover { opacity: 1; }

        /* --- COLOR MODE TOGGLE --- */
        body.color-mode .stealth-widget {
            filter: grayscale(0%) contrast(1);
            opacity: 1;
        }
        body.color-mode .invisible-item {
            color: #666;
        }
    </style>
</head>
<body>

    <div id="syncBar">
        <button class="sync-btn" onclick="toggleSetup()">⚙ CONFIG</button>
        <button class="sync-btn" id="colorToggleBtn" onclick="toggleColors()">◑ COLOR</button>
        <span id="syncStatus" class="status-working">INITIALIZING...</span>
        
        <div id="setupPanel">
            <input type="password" id="tokenInput" placeholder="GitHub Token">
            <input type="text" id="gistIdInput" placeholder="Gist ID">
            <button class="sync-btn" onclick="saveCredentials()">SAVE</button>
        </div>
    </div>

    <div class="controls-container">
        <div class="autocomplete-wrapper">
            <input type="text" id="tickerInput" placeholder="Symbol, ---, or --- NAME" autocomplete="off">
            <div id="suggestions"></div>
        </div>
        <p style="font-size: 9px; color: #222; margin-top: 10px;">Drag to reorder. Double-tap/Double-click to delete.</p>
    </div>

    <div id="stealthList"></div>
    <div id="dashboard" class="dashboard-grid"></div>

    <script>
        // --- INTERNAL DATABASE ---
        const popularTickers = [
            { symbol: "AAPL", exchange: "NASDAQ" }, { symbol: "MSFT", exchange: "NASDAQ" },
            { symbol: "GOOGL", exchange: "NASDAQ" }, { symbol: "AMZN", exchange: "NASDAQ" },
            { symbol: "NVDA", exchange: "NASDAQ" }, { symbol: "META", exchange: "NASDAQ" },
            { symbol: "TSLA", exchange: "NASDAQ" }, { symbol: "NFLX", exchange: "NASDAQ" },
            { symbol: "BRK.B", exchange: "NYSE" }, { symbol: "V", exchange: "NYSE" },
            { symbol: "JPM", exchange: "NYSE" }, { symbol: "WMT", exchange: "NYSE" },
            { symbol: "BTCUSDT", exchange: "BINANCE" }, { symbol: "ETHUSDT", exchange: "BINANCE" },
            { symbol: "SOLUSDT", exchange: "BINANCE" }, { symbol: "XRPUSDT", exchange: "BINANCE" },
            { symbol: "ES1!", exchange: "CME_MINI" }, { symbol: "NQ1!", exchange: "CME_MINI" },
            { symbol: "GC1!", exchange: "COMEX" }, { symbol: "CL1!", exchange: "NYMEX" },
            { symbol: "EURUSD", exchange: "FX" }, { symbol: "GBPUSD", exchange: "FX" }
        ];

        let myTickers = JSON.parse(localStorage.getItem('stealthTickers')) || [];
        const GIST_FILENAME = 'tickers.json';

        const dashboard = document.getElementById('dashboard');
        const stealthListContainer = document.getElementById('stealthList');
        const inputField = document.getElementById('tickerInput');
        const suggestionsBox = document.getElementById('suggestions');

        // --- COLOR MODE LOGIC ---
        let isColorMode = localStorage.getItem('colorMode') === 'true';

        function applyColorMode() {
            const btn = document.getElementById('colorToggleBtn');
            if (isColorMode) {
                document.body.classList.add('color-mode');
                if (btn) btn.innerText = '◑ STEALTH';
            } else {
                document.body.classList.remove('color-mode');
                if (btn) btn.innerText = '◑ COLOR';
            }
        }

        function toggleColors() {
            isColorMode = !isColorMode;
            localStorage.setItem('colorMode', isColorMode);
            applyColorMode();
        }

        // --- FULLY AUTOMATED SYNC CORE ---
        function setStatus(msg, className) {
            const el = document.getElementById('syncStatus');
            el.textContent = msg;
            el.className = className;
        }

        function getCreds() {
            return { token: localStorage.getItem('gistToken'), id: localStorage.getItem('gistId') };
        }

        function toggleSetup() {
            const panel = document.getElementById('setupPanel');
            panel.classList.toggle('visible');
            if (panel.classList.contains('visible')) {
                const { token, id } = getCreds();
                document.getElementById('tokenInput').value = token || '';
                document.getElementById('gistIdInput').value = id || '';
            }
        }

        function saveCredentials() {
            localStorage.setItem('gistToken', document.getElementById('tokenInput').value.trim());
            localStorage.setItem('gistId', document.getElementById('gistIdInput').value.trim());
            document.getElementById('setupPanel').classList.remove('visible');
            autoPullFromGist(); // Pull instantly on save
        }

        // Auto-Push: Called silently whenever a change is made locally
        async function autoPushToGist() {
            const { token, id } = getCreds();
            if (!token) return; // Silent fail if not set up
            
            setStatus('SAVING TO CLOUD...', 'status-working');
            const content = JSON.stringify(myTickers);
            const url = id ? `https://api.github.com/gists/${id}` : 'https://api.github.com/gists';

            try {
                const res = await fetch(url, {
                    method: id ? 'PATCH' : 'POST',
                    headers: { 'Authorization': `token ${token}` },
                    body: JSON.stringify({ 
                        public: false, 
                        files: { [GIST_FILENAME]: { content } } 
                    })
                });
                if (!id) {
                    const data = await res.json();
                    localStorage.setItem('gistId', data.id);
                }
                setStatus('✓ SYNCED', 'status-ok');
            } catch (e) { 
                setStatus('SYNC FAILED', 'status-err'); 
            }
        }

        // Auto-Pull: Called on page load to grab the latest cloud data unconditionally
        async function autoPullFromGist() {
            const { token, id } = getCreds();
            if (!token || !id) {
                setStatus('LOCAL MODE (NOT SYNCED)', 'status-working');
                return;
            }
            
            setStatus('UPDATING FROM CLOUD...', 'status-working');
            try {
                const res = await fetch(`https://api.github.com/gists/${id}?t=${Date.now()}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const data = await res.json();
                
                const cloudContent = data.files[GIST_FILENAME].content;
                myTickers = JSON.parse(cloudContent);
                localStorage.setItem('stealthTickers', JSON.stringify(myTickers));
                
                renderApp();
                setStatus('✓ SYNCED', 'status-ok');
            } catch (e) { 
                setStatus('UPDATE FAILED', 'status-err'); 
            }
        }

        // --- AUTOCOMPLETE LOGIC ---
        inputField.addEventListener('input', function() {
            const query = this.value.toUpperCase();
            suggestionsBox.innerHTML = '';
            
            if (!query || query.startsWith('---')) {
                suggestionsBox.style.display = 'none';
                return;
            }

            const matches = popularTickers.filter(t => t.symbol.includes(query) || t.exchange.includes(query));
            
            if (matches.length > 0) {
                suggestionsBox.style.display = 'block';
                matches.forEach(match => {
                    const fullTicker = `${match.exchange}:${match.symbol}`;
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.innerHTML = `<span>${match.symbol}</span> <span class="sugg-exchange">${match.exchange}</span>`;
                    
                    div.onclick = function() {
                        addTicker(fullTicker);
                        suggestionsBox.style.display = 'none';
                        inputField.value = '';
                    };
                    suggestionsBox.appendChild(div);
                });
            } else {
                suggestionsBox.style.display = 'block';
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerHTML = `<span>Add manually:</span> <span class="sugg-exchange">${query}</span>`;
                div.onclick = function() {
                    addTicker(query);
                    suggestionsBox.style.display = 'none';
                    inputField.value = '';
                };
                suggestionsBox.appendChild(div);
            }
        });

        document.addEventListener('click', function(e) {
            if(e.target !== inputField && e.target !== suggestionsBox) {
                suggestionsBox.style.display = 'none';
            }
        });

        inputField.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const query = this.value.trim().toUpperCase();
                if (query) {
                    addTicker(query);
                    suggestionsBox.style.display = 'none';
                    inputField.value = '';
                }
            }
        });

        // --- TICKER MANAGEMENT ---
        function getTickerChunks() {
            let chunks = [], currentChunk = [];
            myTickers.forEach((item, index) => {
                currentChunk.push({ item: item, originalIndex: index });
                if (currentChunk.filter(i => !i.item.startsWith('---')).length >= 15) {
                    chunks.push(currentChunk); currentChunk = [];
                }
            });
            if (currentChunk.length > 0) chunks.push(currentChunk);
            return chunks;
        }

        function addTicker(tickerString) {
            if (tickerString.startsWith('---')) {
                myTickers.push(tickerString);
                saveLocalAndPush();
                return;
            }
            if (!tickerString.includes(':')) {
                const found = popularTickers.find(t => t.symbol === tickerString);
                if (found) tickerString = `${found.exchange}:${found.symbol}`;
            }
            myTickers.push(tickerString);
            saveLocalAndPush();
        }

        function removeTicker(index) {
            myTickers.splice(index, 1);
            saveLocalAndPush();
        }

        // Saves to browser AND automatically triggers cloud push
        function saveLocalAndPush() {
            localStorage.setItem('stealthTickers', JSON.stringify(myTickers));
            renderApp();
            autoPushToGist();
        }

        // --- RENDER UI ---
        function renderApp() {
            renderStealthList();
            renderWidgets();
        }

        function renderStealthList() {
            stealthListContainer.innerHTML = '';
            getTickerChunks().forEach(chunk => {
                const row = document.createElement('div');
                row.className = 'stealth-row';
                
                chunk.forEach(data => {
                    const item = document.createElement('div');
                    item.className = 'invisible-item';
                    item.draggable = true;
                    if (data.item.startsWith('---')) {
                        let name = data.item.replace('---', '').trim();
                        item.innerText = name ? `--- ${name}` : '---';
                        item.classList.add('separator-item');
                    } else {
                        item.innerText = data.item.split(':')[1] || data.item;
                    }
                    
                    // Drag & Drop
                    item.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/plain', data.originalIndex); setTimeout(() => item.style.opacity = '0.4', 0); });
                    item.addEventListener('dragend', () => { item.style.opacity = '1'; document.querySelectorAll('.invisible-item').forEach(el => el.classList.remove('drag-over')); });
                    item.addEventListener('dragenter', (e) => { e.preventDefault(); item.classList.add('drag-over'); });
                    item.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
                    item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
                    item.addEventListener('drop', (e) => {
                        e.preventDefault();
                        item.classList.remove('drag-over');
                        const fromIdx = parseInt(e.dataTransfer.getData('text/plain'), 10);
                        const toIdx = data.originalIndex;
                        if (fromIdx !== toIdx && !isNaN(fromIdx)) {
                            const moved = myTickers.splice(fromIdx, 1)[0];
                            myTickers.splice(toIdx, 0, moved);
                            saveLocalAndPush(); // Auto-pushes reorders instantly
                        }
                    });

                    // PC Double Click
                    item.addEventListener('dblclick', () => {
                        item.style.transform = 'scale(0.8)';
                        item.style.opacity = '0';
                        setTimeout(() => removeTicker(data.originalIndex), 200);
                    });

                    // Mobile Double Tap
                    let lastTap = 0;
                    item.addEventListener('touchend', (e) => {
                        let currentTime = new Date().getTime();
                        let tapLength = currentTime - lastTap;
                        if (tapLength < 500 && tapLength > 0) { 
                            item.style.transform = 'scale(0.8)';
                            item.style.opacity = '0';
                            setTimeout(() => removeTicker(data.originalIndex), 200);
                            e.preventDefault(); 
                        }
                        lastTap = currentTime;
                    });

                    row.appendChild(item);
                });
                stealthListContainer.appendChild(row);
            });
        }

        function renderWidgets() {
            dashboard.innerHTML = '';
            getTickerChunks().forEach(chunk => {
                const widgetDiv = document.createElement('div');
                widgetDiv.className = 'stealth-widget';
                const containerDiv = document.createElement('div');
                containerDiv.className = 'tradingview-widget-container';
                const placeholder = document.createElement('div');
                placeholder.className = 'tradingview-widget-container__widget';
                containerDiv.appendChild(placeholder);

                let groups = [], currentSymbols = [], currentName = "", groupCounter = 1;
                
                chunk.forEach(data => {
                    let item = data.item;
                    if (item.startsWith('---')) {
                        if (currentSymbols.length > 0) {
                            groups.push({ "name": currentName, "symbols": currentSymbols });
                            currentSymbols = [];
                        } else if (currentName !== "") {
                            groups.push({ "name": currentName, "symbols": [] });
                        }
                        let rawName = item.replace('---', '').trim();
                        currentName = rawName !== "" ? rawName : ("\xA0" + "\u200B".repeat(groupCounter++));
                    } else {
                        currentSymbols.push({ "name": item });
                    }
                });
                
                if (currentSymbols.length > 0) {
                    groups.push({ "name": currentName, "symbols": currentSymbols });
                } else if (currentName !== "") {
                    groups.push({ "name": currentName, "symbols": [] });
                }
                if (groups.length === 1 && groups[0].name !== "") {
                    groups.push({ "name": "\u200B".repeat(groupCounter++), "symbols": [] });
                }

                let totalSymbols = 0;
                groups.forEach(g => totalSymbols += g.symbols.length);
                const dynamicHeight = (totalSymbols * 45 + groups.length * 40 + 65).toString();

                const script = document.createElement('script');
                script.type = 'text/javascript';
                script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js';
                script.async = true;
                script.innerHTML = JSON.stringify({
                    "width": "100%",
                    "height": dynamicHeight,
                    "symbolsGroups": groups,
                    "showSymbolLogo": false,
                    "colorTheme": "dark",
                    "isTransparent": true,
                    "locale": "en"
                });

                containerDiv.appendChild(script);
                widgetDiv.appendChild(containerDiv);
                dashboard.appendChild(widgetDiv);
            });
        }
        
        // App Start
        window.onload = () => { 
            applyColorMode(); // Apply saved color state immediately
            if(myTickers.length === 0) {
                myTickers = ["NASDAQ:AAPL", "NASDAQ:MSFT", "BINANCE:BTCUSDT"];
            }
            renderApp(); // Draw local first so it isn't blank
            autoPullFromGist(); // Then grab cloud update immediately
        };
    </script>
</body>
</html>
