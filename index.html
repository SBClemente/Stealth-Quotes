<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stealth Monitor</title>
    
    <link rel="icon" type="image/x-icon" href="hidden-eye-icon-diagonal-line-for-eye-vector.ico">
    <link rel="apple-touch-icon" href="hidden-eye-icon-diagonal-line-for-eye-vector.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="hidden-eye-icon-diagonal-line-for-eye-vector.ico">

    <style>
        /* ─────────────────────────────────────────────
           BASE
        ───────────────────────────────────────────── */
        body {
            background: #000;
            color: #555;
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* ─────────────────────────────────────────────
           TOP BAR
        ───────────────────────────────────────────── */
        #syncBar {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            padding: 12px 15px;
            background: rgba(0,0,0,0.95);
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            z-index: 8000;
            flex-wrap: wrap;
        }

        .sync-btn {
            background: #050505;
            border: 1px solid #333;
            color: #666;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            padding: 8px 12px;
            cursor: pointer;
            transition: background-color 0.15s, color 0.15s, border-color 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            white-space: nowrap; /* Forces text to stay on one line */
        }
        .sync-btn:hover { border-color: #888; color: #aaa; background: #111; }
        
        /* Subtle grey outline for Active Header Buttons */
        .sync-btn.active { border-color: #666 !important; color: #ccc; }
        
        .sync-btn.highlight { border-color: #aaa; color: #aaa; }

        #syncStatus {
            font-size: 10px;
            letter-spacing: 1px;
            padding: 4px 10px;
            border-radius: 2px;
            text-transform: uppercase;
            margin-left: 10px;
        }
        .status-ok      { color: #4a7; }
        .status-err     { color: #f44; font-weight: bold; }
        .status-working { color: #888; }

        /* ─────────────────────────────────────────────
           CONFIG PANEL (expands under top bar)
        ───────────────────────────────────────────── */
        #setupPanel {
            display: none;
            gap: 8px;
            width: 100%;
            justify-content: flex-start;
            padding-top: 10px;
            margin-top: 5px;
            border-top: 1px dashed #333;
            flex-wrap: wrap;
        }
        #setupPanel.visible { display: flex; }
        #setupPanel input {
            background: #111;
            border: 1px solid #333;
            color: #777;
            width: 200px;
            padding: 6px;
            font-size: 10px;
            font-family: 'Courier New', monospace;
            outline: none;
            box-sizing: border-box;
        }

        /* ─────────────────────────────────────────────
           WORKSPACE AREA
        ───────────────────────────────────────────── */
        #workspaceWrapper {
            width: 100%;
            padding: 15px;
            box-sizing: border-box;
            overflow-x: auto;
            height: calc(100vh - 80px);
        }
        #workspaceWrapper::-webkit-scrollbar        { height: 6px; }
        #workspaceWrapper::-webkit-scrollbar-thumb  { background: #333; border-radius: 3px; }

        #workspace {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            justify-content: flex-start;
            min-width: max-content;
            height: 100%;
        }

        /* ─────────────────────────────────────────────
           COLUMNS
        ───────────────────────────────────────────── */
        .column-container {
            width: calc(25vw - 25px);
            min-width: 440px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border: 1px solid #333;
            background: #000;
            box-sizing: border-box;
            height: 100%;
            transition: border-color 0.1s;
        }

        /* Subtle grey outline for Focused Column */
        .column-container.active-col {
            border-color: #666 !important;
        }

        .col-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            background: #111;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
            cursor: grab;
            transition: background-color 0.2s;
        }
        .col-header:active { cursor: grabbing; }

        .col-title {
            color: #ccc;
            font-size: 12px;
            font-weight: bold;
            pointer-events: none; 
        }
        .col-header-icons { display: flex; gap: 8px; align-items: center; }
        .col-header-icons button {
            background: transparent;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 14px;
            padding: 0 4px;
            transition: color 0.15s;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }
        .col-header-icons button:hover { color: #aaa; }

        /* ─────────────────────────────────────────────
           TABS
        ───────────────────────────────────────────── */
        .tabBar {
            display: flex;
            overflow-x: auto;
            border-bottom: 1px solid #222;
            background: #050505;
            align-items: center;
            padding: 0 5px;
            flex-shrink: 0;
        }
        .tabBar::-webkit-scrollbar { height: 0px; } 

        .tab-btn {
            background: transparent;
            color: #777;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            white-space: nowrap;
            transition: background-color 0.15s, color 0.15s;
            outline: none;
            display: flex;
            align-items: center;
            gap: 5px;
            box-sizing: border-box;
            border-bottom: none;
        }
        .tab-btn:hover { color: #aaa; background: #111; }
        
        /* Subtle grey outline for Active Watchlist Tabs */
        .tab-btn.active { 
            color: #ccc; 
            background: #1a1a1a; 
            box-shadow: inset 0 0 0 1px #666; 
        }

        .tab-move-btn {
            background: transparent;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 10px;
            padding: 0 2px;
            transition: color 0.15s;
        }
        .tab-move-btn:hover { color: #aaa; }

        .tab-del-btn {
            background: transparent;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 12px;
            padding: 0 2px;
            margin-left: 4px;
            font-weight: bold;
            transition: color 0.15s;
        }
        .tab-del-btn:hover { color: #aaa; }

        .tab-controls { display: flex; margin-left: auto; align-items: center; }
        .icon-btn {
            background: transparent;
            border: none;
            color: #666;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 8px;
            transition: color 0.15s;
            font-weight: bold;
        }
        .icon-btn:hover { color: #aaa; }
        
        .inline-tab-input {
            background: transparent;
            color: #aaa;
            border: none;
            border-bottom: 1px solid #555;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            width: 80px;
            outline: none;
            padding: 4px;
            margin: 0 5px;
            display: none;
        }

        /* ─────────────────────────────────────────────
           WIDGET STACK
        ───────────────────────────────────────────── */
        .widgetStack {
            flex-grow: 1;
            width: 100%;
            background: #050505;
            position: relative;
            overflow: hidden;
        }
        .widgetLayer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
        }
        .widgetLayer.active { display: block; }

        .stealth-widget, .tradingview-widget-container, .tradingview-widget-container__widget { height: 100%; width: 100%; }
        
        .stealth-widget { filter: grayscale(100%) contrast(1.2); opacity: 0.7; transition: filter 0.3s, opacity 0.3s; }
        .stealth-widget:hover { opacity: 1; }
        body.color-mode .stealth-widget { filter: grayscale(0%) contrast(1); opacity: 1; }

        /* ─────────────────────────────────────────────
           BOTTOM INPUT BAR
        ───────────────────────────────────────────── */
        .bottomInputBar {
            display: flex;
            border-top: 1px solid #222;
            background: #0a0a0a;
            padding: 4px 8px;
            align-items: center;
            position: relative;
            flex-shrink: 0;
        }
        .colTickerInput {
            flex-grow: 1;
            width: 100%;
            box-sizing: border-box;
            background: transparent;
            border: none;
            color: #777;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            outline: none;
            padding: 6px 8px;
        }
        .colTickerInput::placeholder { color: #555; }
        .import-wrapper { display: flex; align-items: center; gap: 8px; border-left: 1px solid #333; padding-left: 8px; }
        .import-wrapper span { color: #555; font-size: 10px; }
        .bottom-btn {
            background: transparent;
            border: 1px solid #333;
            color: #888;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            padding: 4px 8px;
            cursor: pointer;
            transition: background-color 0.15s, color 0.15s, border-color 0.15s;
        }
        .bottom-btn:hover { color: #ccc; border-color: #666; }

        /* ─────────────────────────────────────────────
           LIVE SYMBOL SEARCH DROPDOWN
        ───────────────────────────────────────────── */
        .suggestions-box {
            position: absolute;
            bottom: 100%; left: 0; right: 0;
            background: #0a0a0a;
            border: 1px solid #333;
            border-bottom: none;
            max-height: 250px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            text-align: left;
            box-shadow: 0px -5px 15px rgba(0,0,0,0.9);
        }
        .suggestions-box::-webkit-scrollbar { width: 4px; } .suggestions-box::-webkit-scrollbar-thumb { background: #444; }
        
        .suggestion-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #111; display: flex; justify-content: space-between; align-items: center; transition: background-color 0.15s; }
        .suggestion-item:hover { background: #1a1a1a; }
        .sugg-text-col { display: flex; flex-direction: column; }
        .sugg-symbol { color: #ccc; font-weight: bold; font-size: 11px; }
        .sugg-name { color: #666; font-size: 9px; margin-top: 2px; }
        .sugg-exchange { font-size: 9px; color: #555; font-weight: bold; }

        /* ─────────────────────────────────────────────
           MODALS
        ───────────────────────────────────────────── */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.3); z-index: 9000; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
        .modal-overlay.visible { display: flex; }
        .editor-content { background: rgba(5,5,5,0.85); border: 1px solid #444; padding: 20px; width: 95%; max-width: 600px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.95); }
        .editor-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #444; padding-bottom: 10px; margin-bottom: 10px; }
        .editor-header span { color: #aaa; font-weight: bold; font-size: 12px; display: flex; align-items: center; }
        textarea.stealth-textarea { background: rgba(0,0,0,0.5); color: #ccc; border: 1px solid #333; width: 100%; height: 350px; font-family: 'Courier New', monospace; padding: 15px; outline: none; resize: vertical; line-height: 1.5; box-sizing: border-box; font-size: 12px; transition: border-color 0.15s; }
        textarea.stealth-textarea:focus { border-color: #555; }
        .editor-actions { display: flex; justify-content: space-between; margin-top: 10px; }

        /* ─────────────────────────────────────────────
           FIXED WORKSPACE FOOTER
        ───────────────────────────────────────────── */
        #footerBar { position: fixed; bottom: 0; left: 0; width: 100%; height: 30px; background: #050505; border-top: 1px solid #222; display: flex; align-items: center; z-index: 8000; }
        #wsTabsContainer { display: flex; height: 100%; overflow-x: auto; flex-grow: 1;}
        #wsTabsContainer::-webkit-scrollbar { height: 0px; } 
        
        .ws-btn { background: transparent; color: #777; border: none; height: 100%; padding: 0 15px; cursor: pointer; font-family: 'Courier New', monospace; font-size: 11px; transition: color 0.15s; border-right: 1px solid #222; display: flex; align-items: center; gap: 5px; outline: none;}
        .ws-btn:hover { color: #aaa; background: #0a0a0a; }
        
        /* Subtle grey outline for Active Footer Tabs */
        .ws-btn.active { 
            color: #ccc; 
            background: #111; 
            font-weight: bold; 
            box-shadow: inset 0 0 0 1px #666; 
            border-right-color: transparent; 
        }

        .ws-del-btn { background: transparent; border: none; color: #666; cursor: pointer; font-size: 12px; padding: 0 2px; font-weight: bold; margin-left: 5px;}
        .ws-del-btn:hover { color: #aaa; }
        
        @media (max-width: 768px) {
            /* Lock viewport to exact visible screen size to prevent footer from hiding behind URL bars */
            body, html { overflow: hidden !important; height: 100vh; height: 100dvh; position: fixed; width: 100%; top: 0; left: 0; }
            
            /* Allow top bar buttons to wrap into two rows perfectly and show status */
            #syncBar { flex-wrap: wrap; overflow: visible; padding: 8px 10px; height: 105px; box-sizing: border-box; justify-content: center; gap: 5px; }
            #syncBar::-webkit-scrollbar { display: none; }
            .sync-btn { flex: 1 1 45%; padding: 8px 4px; }
            #syncStatus { width: 100%; text-align: center; margin: 0; padding-top: 2px; }
            
            /* Make Config Panel absolute so it doesn't push the layout down and require scrolling */
            #setupPanel { position: absolute; top: 100%; left: 0; width: 100%; background: #050505; padding: 15px 10px; border-bottom: 1px solid #333; z-index: 9000; justify-content: center; margin: 0; }

            #workspace { flex-direction: column; min-width: 100%; height: 100%; }
            
            /* Show only ONE watchlist monitor */
            .column-container:nth-child(n+2) { display: none !important; }
            
            /* Maximize width but keep the default border to frame the Quote Monitor */
            .column-container { 
                width: 100%; 
                flex-shrink: 1; 
                margin-bottom: 0; 
                min-width: 0; 
                height: 100%; 
            }
            
            /* Calculate exact wrapper height and add SYMMETRIC padding OUTSIDE the Quote Monitor */
            #workspaceWrapper { 
                padding: 10px; 
                height: calc(100vh - 135px); 
                height: calc(100dvh - 135px); 
                overflow: hidden;
            }

            /* CRITICAL: Prevent the widget stack from expanding and pushing the bottom input bar off-screen */
            .widgetStack { 
                flex: 1 1 0%; 
                min-height: 0; 
                overflow: hidden; 
            }
            
            /* Force exactly 4 columns and perfectly match the right border by using transform to prevent scroll bugs */
            .stealth-widget { 
                width: 130% !important; 
                min-width: 450px !important;
                max-width: 130% !important;
                height: 130% !important; 
                transform: scale(0.77);
                transform-origin: top left;
            }
        }
    </style>
</head>
<body>

    <div id="syncBar">
        <button class="sync-btn" id="colorToggleBtn" onclick="toggleColors()">◑ COLOR</button>
        <button class="sync-btn" id="notesToggleBtn" onclick="toggleJournal()">⊟ NOTES</button>
        <button class="sync-btn" id="masterToggleBtn" onclick="openMasterEditor()">▤ MASTER BULK</button>
        <button class="sync-btn" id="configToggleBtn" onclick="toggleSetup()">⚙ CONFIG</button>
        <span id="syncStatus" class="status-working">INITIALIZING...</span>
        
        <div id="setupPanel">
            <input type="password" id="tokenInput" placeholder="Token (Needs 'gist' checked)" autocomplete="off">
            <input type="text" id="gistIdInput" placeholder="ID (Auto-fills on save)" autocomplete="off">
            <button class="sync-btn highlight" onclick="saveCredentials()">CONNECT</button>
            <button class="sync-btn" onclick="clearCredentials()" style="border-color:#622; color:#966;">CLEAR</button>
        </div>
    </div>

    <div id="workspaceWrapper">
        <div id="workspace"></div>
    </div>

    <div id="footerBar">
        <div id="wsTabsContainer"></div>
        <input type="text" id="wsInput" class="inline-tab-input" style="height: 100%; margin: 0 5px;" placeholder="Name...">
        <button class="icon-btn" id="addWsBtn" onclick="showAddWs()" style="height: 100%; border-left: 1px solid #222; padding: 0 15px;">[+]</button>
    </div>

    <div id="tabEditorModal" class="modal-overlay">
        <div class="editor-content">
            <div class="editor-header">
                <span id="tabEditorTitle">BATCH IMPORT</span>
                <span style="font-size: 10px; color: #777;">Use --- GroupName for dividers</span>
            </div>
            <textarea id="tabEditor" class="stealth-textarea" spellcheck="false"></textarea>
            <div class="editor-actions">
                <button class="bottom-btn" onclick="closeTabEditor()">[×] CANCEL</button>
                <button class="bottom-btn" style="border-color: #555; color: #ccc;" onclick="saveTabEdit()">[+] SAVE TAB</button>
            </div>
        </div>
    </div>

    <div id="masterEditorModal" class="modal-overlay">
        <div class="editor-content">
            <div class="editor-header">
                <span>MASTER RAW EDIT (ALL TABS)</span>
                <span style="font-size: 10px; color: #777;">Use === TabName for new tabs</span>
            </div>
            <textarea id="masterEditor" class="stealth-textarea" spellcheck="false"></textarea>
            <div class="editor-actions">
                <button class="bottom-btn" onclick="closeMasterEditor()">[×] CANCEL</button>
                <button class="bottom-btn" style="border-color: #555; color: #ccc;" onclick="saveMasterEdit()">[+] OVERWRITE ALL</button>
            </div>
        </div>
    </div>

    <div id="journalModal" class="modal-overlay">
        <div class="editor-content" style="height: auto;">
            <div class="editor-header">
                <span>--- SECURE LOGS</span>
                <button class="icon-btn" onclick="toggleJournal()" style="padding:0; border:none; margin:0;">[×]</button>
            </div>
            <textarea id="stealthJournal" class="stealth-textarea" style="height: 250px;" placeholder="Log ideas or structural calculations here..."></textarea>
        </div>
    </div>

    <script>
        let myTickers = [];
        let myJournal = "";
        
        let workspacesData = [{ id: 'ws_default', name: 'MAIN', columns: ["MAIN"] }];
        let activeWsId = 'ws_default';
        let columnsState = [];

        let editingTabName = ""; 
        let searchTimeout;
        let lastEscTime = 0;
        let gistPushTimeout;
        
        // GLOBAL FOCUS STATE
        let draggedTabName = null;
        let draggedColIndex = null;
        let draggedWsId = null;
        let currentFocus = { type: null, id: null, colIndex: null };

        const GIST_FILENAME = 'tickers.json';
        const workspace = document.getElementById('workspace');
        const journalInput = document.getElementById('stealthJournal');
        const widgetCache = {};

        // --- HEADER BUTTON STATE MANAGER ---
        function updateHeaderActiveStates() {
            document.getElementById('colorToggleBtn').classList.toggle('active', isColorMode);
            document.getElementById('notesToggleBtn').classList.toggle('active', document.getElementById('journalModal').classList.contains('visible'));
            document.getElementById('masterToggleBtn').classList.toggle('active', document.getElementById('masterEditorModal').classList.contains('visible'));
            document.getElementById('configToggleBtn').classList.toggle('active', document.getElementById('setupPanel').classList.contains('visible'));
        }

        // --- FOCUS ENGINE ---
        function setFocus(type, id, colIndex) {
            clearFocus();
            currentFocus = { type, id, colIndex };
            
            if (colIndex !== null) {
                const col = document.getElementById(`col-${colIndex}`);
                if (col) col.classList.add('active-col');
            }
        }

        function clearFocus() {
            if (currentFocus.colIndex !== null) {
                const col = document.getElementById(`col-${currentFocus.colIndex}`);
                if (col) col.classList.remove('active-col');
            }
            currentFocus = { type: null, id: null, colIndex: null };
        }

        document.addEventListener('click', (e) => {
            // Check if user clicked the dark overlay background outside of a modal
            if (e.target.classList.contains('modal-overlay')) {
                closeTabEditor();
                closeMasterEditor();
                const jModal = document.getElementById('journalModal');
                if (jModal.classList.contains('visible')) toggleJournal();
                updateHeaderActiveStates();
                return;
            }

            const col = e.target.closest('.column-container');
            const tabBtn = e.target.closest('.tab-btn');
            const wsBtn = e.target.closest('.ws-btn');
            const syncBtn = e.target.closest('.sync-btn');
            
            if (syncBtn) {
                clearFocus();
                return;
            }
            
            if (tabBtn || wsBtn) return; // Handled inline so columns register accurately
            
            if (col) {
                const colIndex = parseInt(col.id.replace('col-', ''));
                setFocus('column', null, colIndex);
            } else if (!e.target.closest('.modal-overlay.visible') && !e.target.closest('#setupPanel')) {
                clearFocus();
            }
        });

        // --- HOTKEYS & DOUBLE ESC COLLAPSE ---
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                    e.target.blur();
                }

                const now = Date.now();
                const fast = now - lastEscTime < 400;
                lastEscTime = now;
                
                if (!fast) return;

                const openModals = document.querySelectorAll('.modal-overlay.visible');
                if (openModals.length > 0 || document.getElementById('setupPanel').classList.contains('visible')) {
                    closeTabEditor();
                    closeMasterEditor();
                    const j = document.getElementById('journalModal');
                    if (j.classList.contains('visible')) toggleJournal();
                    const s = document.getElementById('setupPanel');
                    if (s.classList.contains('visible')) toggleSetup();
                    
                    updateHeaderActiveStates();
                    return;
                }

                if (!currentFocus.type) return;
                if (currentFocus.type === 'column') {
                    removeColumn(currentFocus.colIndex);
                } else if (currentFocus.type === 'tab') {
                    deleteTab(currentFocus.id);
                } else if (currentFocus.type === 'workspace') {
                    if (workspacesData.length > 1 && confirm('Delete this entire workspace?')) {
                        workspacesData = workspacesData.filter(w => w.id !== currentFocus.id);
                        if (activeWsId === currentFocus.id) activeWsId = workspacesData[0].id;
                        syncColumnsFromWorkspace();
                        saveLocalState();
                        workspace.innerHTML = '';
                        invalidateAllWidgets();
                        renderApp();
                    }
                }
                clearFocus();
            }

            if (e.key === '\\') {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                e.preventDefault();
                let targetInput = null;
                
                if (currentFocus.colIndex !== null) {
                    const col = document.getElementById(`col-${currentFocus.colIndex}`);
                    if (col) targetInput = col.querySelector('.colTickerInput');
                }
                if (!targetInput) {
                    targetInput = document.querySelector('.colTickerInput');
                }
                
                if (targetInput) {
                    targetInput.focus();
                    const colWrapper = targetInput.closest('.column-container');
                    if (colWrapper) {
                        const idx = parseInt(colWrapper.id.replace('col-', ''));
                        setFocus('column', null, idx);
                    }
                }
            }
        });

        // --- BOOT: LOAD LOCAL STATE ---
        (function loadLocal() {
            try {
                const raw = localStorage.getItem('stealthData');
                if (raw) {
                    const d = JSON.parse(raw);
                    if (Array.isArray(d)) { myTickers = d; }
                    else { myTickers = d.tickers || []; myJournal = d.journal || ""; }
                }
            } catch(e) {}
            
            try {
                const wsd = JSON.parse(localStorage.getItem('stealthWorkspaces'));
                const awid = localStorage.getItem('stealthActiveWs');
                if (Array.isArray(wsd) && wsd.length > 0) {
                    workspacesData = wsd;
                    activeWsId = awid || wsd[0].id;
                } else {
                    const oldCols = JSON.parse(localStorage.getItem('stealthCols'));
                    if (Array.isArray(oldCols) && oldCols.length > 0) {
                        workspacesData[0].columns = oldCols;
                    }
                }
            } catch(e) {}
            
            syncColumnsFromWorkspace();
            journalInput.value = myJournal;
        })();

        function syncColumnsFromWorkspace() {
            const ws = workspacesData.find(w => w.id === activeWsId);
            if (ws) columnsState = [...ws.columns];
        }

        // --- JOURNAL AUTO-SAVE ---
        let journalTimeout;
        journalInput.addEventListener('input', () => {
            myJournal = journalInput.value;
            clearTimeout(journalTimeout);
            journalTimeout = setTimeout(() => { saveLocalState(); debouncedGistPush(); }, 600);
        });

        // --- COLOR MODE ---
        let isColorMode = localStorage.getItem('colorMode') === 'true';
        function applyColorMode() {
            document.body.classList.toggle('color-mode', isColorMode);
            document.getElementById('colorToggleBtn').innerText = isColorMode ? '◑ STEALTH' : '◑ COLOR';
            updateHeaderActiveStates();
        }
        function toggleColors() {
            isColorMode = !isColorMode;
            localStorage.setItem('colorMode', isColorMode);
            applyColorMode(); 
        }

        // --- SYNC CORE ---
        function setStatus(msg, className) { document.getElementById('syncStatus').textContent = msg; document.getElementById('syncStatus').className = className; }
        function getCreds() { return { token: localStorage.getItem('gistToken') || '', id: localStorage.getItem('gistId') || '' }; }
        function toggleSetup() { 
            const panel = document.getElementById('setupPanel');
            panel.classList.toggle('visible');
            if (panel.classList.contains('visible')) {
                const { token, id } = getCreds();
                if (token) document.getElementById('tokenInput').value = token;
                if (id) document.getElementById('gistIdInput').value = id;
            }
            updateHeaderActiveStates();
        }

        async function saveCredentials() {
            const rawToken = document.getElementById('tokenInput').value.trim();
            const rawId = document.getElementById('gistIdInput').value.trim();

            if (!rawToken) { setStatus('MISSING TOKEN', 'status-err'); return; }

            localStorage.setItem('gistToken', rawToken);
            if (rawId) localStorage.setItem('gistId', rawId);
            
            const { id } = getCreds();
            if(!id) {
                setStatus('CREATING GIST...', 'status-working');
                try {
                    const res = await fetch('https://api.github.com/gists', {
                        method: 'POST', headers: { 'Authorization': `token ${rawToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ public: false, files: { [GIST_FILENAME]: { content: JSON.stringify({ tickers: myTickers, journal: myJournal }) } } })
                    });
                    if(!res.ok) throw new Error("Permission Error");
                    const data = await res.json();
                    localStorage.setItem('gistId', data.id);
                    document.getElementById('gistIdInput').value = data.id; 
                    setStatus('✓ SYNCED', 'status-ok');
                } catch (e) {
                    setStatus('PERMISSION DENIED', 'status-err');
                }
            } else {
                autoPullFromGist();
            }
        }

        function clearCredentials() {
            if (!confirm('Clear saved token and Gist ID?')) return;
            localStorage.removeItem('gistToken');
            localStorage.removeItem('gistId');
            document.getElementById('tokenInput').value = '';
            document.getElementById('gistIdInput').value = '';
            setStatus('LOCAL MODE', 'status-working');
        }

        function debouncedGistPush() {
            clearTimeout(gistPushTimeout);
            gistPushTimeout = setTimeout(autoPushToGist, 400);
        }

        async function autoPushToGist() {
            const { token, id } = getCreds();
            if (!token || !id) return; 
            setStatus('SAVING...', 'status-working');
            try {
                const res = await fetch(`https://api.github.com/gists/${id}`, {
                    method: 'PATCH', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ files: { [GIST_FILENAME]: { content: JSON.stringify({ tickers: myTickers, journal: myJournal }) } } })
                });
                if(!res.ok) throw new Error("Sync Failed");
                setStatus('✓ SYNCED', 'status-ok');
            } catch (e) { setStatus('SYNC FAILED', 'status-err'); }
        }

        async function autoPullFromGist() {
            const { token, id } = getCreds();
            if (!token || !id) { setStatus('LOCAL MODE', 'status-working'); return; }
            setStatus('UPDATING...', 'status-working');
            try {
                const res = await fetch(`https://api.github.com/gists/${id}?t=${Date.now()}`, { headers: { 'Authorization': `token ${token}` } });
                if(!res.ok) throw new Error("Pull Failed");
                const gist = await res.json();
                const cloudContent = JSON.parse(gist.files[GIST_FILENAME].content);
                if (Array.isArray(cloudContent)) { myTickers = cloudContent; } else { myTickers = cloudContent.tickers || []; myJournal = cloudContent.journal || ""; }
                saveLocalState(); journalInput.value = myJournal; 
                invalidateAllWidgets();
                workspace.innerHTML = ''; 
                renderApp(); 
                setStatus('✓ SYNCED', 'status-ok');
            } catch (e) { setStatus('UPDATE FAILED', 'status-err'); }
        }

        function saveLocalState() {
            const ws = workspacesData.find(w => w.id === activeWsId);
            if (ws) ws.columns = [...columnsState]; 
            
            localStorage.setItem('stealthData', JSON.stringify({ tickers: myTickers, journal: myJournal }));
            localStorage.setItem('stealthWorkspaces', JSON.stringify(workspacesData));
            localStorage.setItem('stealthActiveWs', activeWsId);
        }
        
        // --- CACHE HELPERS ---
        function itemHash(items) {
            let h = 0;
            const s = items.join('|');
            for (let i = 0; i < s.length; i++) { h = (Math.imul(31, h) + s.charCodeAt(i)) | 0; }
            return h;
        }
        function widgetCacheKey(colIndex, tabName) { return `${activeWsId}|${colIndex}|${tabName}`; }
        function invalidateAllWidgets() { for (const k in widgetCache) delete widgetCache[k]; }
        function invalidateTabWidgets(tabName) { for (const k in widgetCache) { if (k.endsWith(`|${tabName}`)) delete widgetCache[k]; } }

        // --- DATA PARSING & TAB REORDERING ---
        function getParsedTabs() {
            let tabs = []; let currentTab = null;
            myTickers.forEach(item => {
                if (item.startsWith('===')) {
                    if (currentTab) tabs.push(currentTab);
                    currentTab = { name: item.replace('===', '').trim() || "UNNAMED", items: [] };
                } else {
                    if (!currentTab) currentTab = { name: "MAIN", items: [] };
                    currentTab.items.push(item);
                }
            });
            if (currentTab) tabs.push(currentTab);
            if (tabs.length === 0) tabs.push({ name: "MAIN", items: [] });
            return tabs;
        }

        function reserializeFromTabs(tabs) {
            myTickers = [];
            tabs.forEach(t => { myTickers.push(`=== ${t.name}`); myTickers.push(...t.items); });
        }

        function moveTab(tabName, direction) {
            let tabs = getParsedTabs();
            let idx = tabs.findIndex(t => t.name === tabName);
            if (idx === -1) return;
            const swap = direction === 'left' ? idx - 1 : idx + 1;
            if (swap < 0 || swap >= tabs.length) return;
            [tabs[idx], tabs[swap]] = [tabs[swap], tabs[idx]];
            reserializeFromTabs(tabs);
            saveLocalState(); debouncedGistPush(); renderApp();
        }

        function deleteTab(tabName) {
            if(!confirm(`Are you sure you want to delete the entire [${tabName}] watchlist?`)) return;
            let tabs = getParsedTabs().filter(t => t.name !== tabName);
            if(!tabs.length) tabs = [{name: "MAIN", items: []}];
            reserializeFromTabs(tabs);
            columnsState = columnsState.map(c => c === tabName ? tabs[0].name : c);
            invalidateTabWidgets(tabName);
            workspace.innerHTML = '';
            saveLocalState(); debouncedGistPush(); renderApp();
        }

        function getItemsForTab(tabName) { return getParsedTabs().find(t => t.name === tabName)?.items ?? []; }

        // --- WORKSPACE FOOTER MANAGEMENT & DRAG ---
        function showAddWs() {
            document.getElementById('addWsBtn').style.display = 'none';
            const input = document.getElementById('wsInput');
            input.style.display = 'inline-block';
            input.focus();
        }

        function processAddWs() {
            const input = document.getElementById('wsInput');
            const name = input.value.trim().toUpperCase();
            if (name) {
                const newId = 'ws_' + Date.now();
                workspacesData.push({ id: newId, name: name, columns: ['MAIN'] });
                activeWsId = newId;
                syncColumnsFromWorkspace();
                saveLocalState();
                renderApp();
            }
            input.value = '';
            input.style.display = 'none';
            document.getElementById('addWsBtn').style.display = 'inline-block';
        }

        document.getElementById('wsInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); processAddWs(); } });
        document.getElementById('wsInput').addEventListener('blur', () => { processAddWs(); });

        function switchWorkspace(id) {
            activeWsId = id;
            syncColumnsFromWorkspace();
            saveLocalState();
            renderApp(); 
        }

        function deleteWorkspace(id) {
            if(workspacesData.length <= 1) { return; }
            if(!confirm("Delete this entire workspace?")) return;
            
            workspacesData = workspacesData.filter(w => w.id !== id);
            if (activeWsId === id) activeWsId = workspacesData[0].id;
            syncColumnsFromWorkspace();
            saveLocalState();
            workspace.innerHTML = ''; 
            invalidateAllWidgets();
            renderApp();
        }

        function renderFooter() {
            const container = document.getElementById('wsTabsContainer');
            container.innerHTML = '';
            workspacesData.forEach(ws => {
                const btn = document.createElement('button');
                const isActive = ws.id === activeWsId;
                btn.className = `ws-btn ${isActive ? 'active' : ''}`;
                
                btn.onclick = (e) => {
                    e.stopPropagation();
                    switchWorkspace(ws.id);
                    setFocus('workspace', ws.id, null);
                };

                btn.draggable = true;
                btn.ondragstart = (e) => {
                    draggedTabName = null; draggedColIndex = null;
                    draggedWsId = ws.id;
                    e.dataTransfer.effectAllowed = 'move';
                };
                btn.ondragover = (e) => {
                    if (draggedWsId !== null) {
                        e.preventDefault();
                        e.dataTransfer.dropEffect = 'move';
                    }
                };
                btn.ondrop = (e) => {
                    if (draggedWsId !== null && draggedWsId !== ws.id) {
                        e.preventDefault();
                        e.stopPropagation();
                        const fromIdx = workspacesData.findIndex(w => w.id === draggedWsId);
                        const toIdx = workspacesData.findIndex(w => w.id === ws.id);
                        const [moved] = workspacesData.splice(fromIdx, 1);
                        workspacesData.splice(toIdx, 0, moved);
                        draggedWsId = null;
                        saveLocalState();
                        renderApp();
                    }
                };
                
                let html = ws.name;
                if (isActive) {
                    html += `<button class="ws-del-btn" onclick="event.stopPropagation(); deleteWorkspace('${ws.id}')">[×]</button>`;
                }
                btn.innerHTML = html;
                container.appendChild(btn);
            });
        }

        // --- MULTI-COLUMN UI SURGICAL RENDERING ---
        function addColumn() { columnsState.push(getParsedTabs()[0].name); saveLocalState(); renderApp(); }
        
        function removeColumn(index) { 
            for (const k in widgetCache) { if (k.startsWith(`${activeWsId}|${index}|`)) delete widgetCache[k]; }
            columnsState.splice(index, 1); 
            if(!columnsState.length) columnsState = ["MAIN"]; 
            saveLocalState(); renderApp(); 
        }

        function switchColumnTab(colIndex, tabName) { 
            columnsState[colIndex] = tabName; 
            saveLocalState(); 
            updateColumnWidget(colIndex);
            updateColumnTabBar(colIndex);
        }

        function renderApp() {
            clearFocus(); 
            const tabs = getParsedTabs();
            renderFooter();

            columnsState = columnsState.map(c => tabs.find(t => t.name === c) ? c : tabs[0].name);

            while (workspace.children.length < columnsState.length) {
                const colIndex = workspace.children.length;
                workspace.appendChild(buildColumnShell(colIndex));
            }
            
            while (workspace.children.length > columnsState.length) {
                const colIndex = workspace.children.length - 1;
                for (const k in widgetCache) { if (k.startsWith(`${activeWsId}|${colIndex}|`)) delete widgetCache[k]; }
                workspace.removeChild(workspace.lastChild);
            }

            columnsState.forEach((_, colIndex) => {
                updateColumnTabBar(colIndex);
                updateColumnWidget(colIndex);
            });
        }

        function buildColumnShell(colIndex) {
            const colDiv = document.createElement('div');
            colDiv.className = 'column-container';
            colDiv.id = `col-${colIndex}`;

            colDiv.innerHTML = `
                <div class="col-header">
                    <span class="col-title">Quote Monitor</span>
                    <div class="col-header-icons">
                        <button onclick="addColumn()" title="Add Column">[+]</button>
                        <button onclick="removeColumn(${colIndex})" title="Close Column">[×]</button>
                    </div>
                </div>
            `;
            
            const colHeader = colDiv.querySelector('.col-header');
            colHeader.draggable = true;
            colHeader.ondragstart = (e) => {
                draggedTabName = null; draggedWsId = null;
                draggedColIndex = colIndex;
                e.dataTransfer.effectAllowed = 'move';
            };
            colDiv.ondragover = (e) => {
                if (draggedColIndex !== null) {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                }
            };
            colDiv.ondrop = (e) => {
                if (draggedColIndex !== null && draggedColIndex !== colIndex) {
                    e.preventDefault();
                    const moved = columnsState.splice(draggedColIndex, 1)[0];
                    columnsState.splice(colIndex, 0, moved);
                    draggedColIndex = null;
                    saveLocalState();
                    renderApp();
                }
            };

            const tabBar = document.createElement('div');
            tabBar.className = 'tabBar';
            tabBar.id = `tabbar-${colIndex}`;
            colDiv.appendChild(tabBar);

            const stack = document.createElement('div');
            stack.className = 'widgetStack';
            stack.id = `wstack-${colIndex}`;
            colDiv.appendChild(stack);

            colDiv.appendChild(buildBottomBar(colIndex));

            return colDiv;
        }

        function buildTabBar(colIndex, activeTabName, tabs) {
            const tabBar = document.createElement('div');
            tabBar.className = 'tabBar';
            tabBar.id = `tabbar-${colIndex}`;

            tabs.forEach(tab => {
                const btn = document.createElement('button');
                const isActive = tab.name === activeTabName;
                btn.className = `tab-btn ${isActive ? 'active' : ''}`;
                
                btn.onclick = (e) => {
                    e.stopPropagation();
                    switchColumnTab(colIndex, tab.name);
                    setFocus('tab', tab.name, colIndex);
                };

                btn.draggable = true; 
                btn.ondragstart = (e) => { 
                    draggedColIndex = null; draggedWsId = null;
                    draggedTabName = tab.name; 
                    e.dataTransfer.effectAllowed = 'move'; 
                };
                btn.ondragover = (e) => { 
                    if (draggedTabName !== null) {
                        e.preventDefault(); 
                        e.dataTransfer.dropEffect = 'move'; 
                    }
                };
                btn.ondrop = (e) => {
                    if(draggedTabName !== null && draggedTabName !== tab.name) {
                        e.preventDefault();
                        e.stopPropagation();
                        let parsed = getParsedTabs();
                        let fromIdx = parsed.findIndex(t => t.name === draggedTabName);
                        let toIdx = parsed.findIndex(t => t.name === tab.name);
                        let [moved] = parsed.splice(fromIdx, 1);
                        parsed.splice(toIdx, 0, moved);
                        reserializeFromTabs(parsed);
                        saveLocalState(); debouncedGistPush(); renderApp();
                    }
                };

                if (isActive) {
                    btn.innerHTML = `
                        <button class="tab-move-btn" onclick="event.stopPropagation(); moveTab('${tab.name}', 'left')">&lt;</button>
                        ${tab.name}
                        <button class="tab-move-btn" onclick="event.stopPropagation(); moveTab('${tab.name}', 'right')">&gt;</button>
                        <button class="tab-del-btn" title="Delete Watchlist" onclick="event.stopPropagation(); deleteTab('${tab.name}')">[×]</button>
                    `;
                } else {
                    btn.innerText = `[ ${tab.name} ]`;
                }
                tabBar.appendChild(btn);
            });

            const tabControls = document.createElement('div');
            tabControls.className = 'tab-controls';
            
            const addTabBtn = document.createElement('button');
            addTabBtn.className = 'icon-btn'; addTabBtn.innerText = '[+]'; 
            const inlineInput = document.createElement('input');
            inlineInput.type = 'text'; inlineInput.className = 'inline-tab-input'; inlineInput.placeholder = 'Name...';
            
            let isProcessingTab = false;
            const processInlineTab = () => {
                if (isProcessingTab) return;
                isProcessingTab = true;
                
                const newName = inlineInput.value.trim().toUpperCase();
                if (newName) {
                    inlineInput.value = ''; 
                    myTickers.push(`=== ${newName}`);
                    columnsState[colIndex] = newName;
                    saveLocalState(); debouncedGistPush(); renderApp();
                } else {
                    renderApp(); 
                }
            };

            addTabBtn.onclick = () => {
                addTabBtn.style.display = 'none';
                inlineInput.style.display = 'inline-block';
                inlineInput.focus();
            };

            inlineInput.addEventListener('keypress', (e) => { 
                if (e.key === 'Enter') {
                    e.preventDefault();
                    processInlineTab(); 
                }
            });
            inlineInput.addEventListener('blur', () => { processInlineTab(); });

            tabControls.appendChild(addTabBtn); 
            tabControls.appendChild(inlineInput);
            tabBar.appendChild(tabControls);

            return tabBar;
        }

        function buildBottomBar(colIndex) {
            const bottomBar = document.createElement('div');
            bottomBar.className = 'bottomInputBar';

            const inputWrap = document.createElement('div');
            inputWrap.style.cssText = 'position:relative;flex-grow:1;';

            const inputEl = document.createElement('input');
            inputEl.type = 'text'; inputEl.className = 'colTickerInput';
            inputEl.placeholder = 'Type [ticker] or /N [ticker]';

            const suggBox = document.createElement('div');
            suggBox.className = 'suggestions-box';

            function makeSuggItem(symbol, name, exchange) {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                const fullTicker = exchange ? `${exchange}:${symbol}` : symbol;
                div.innerHTML = `
                    <div class="sugg-text-col" style="max-width:75%;">
                        <span class="sugg-symbol">${symbol}</span>
                        <span class="sugg-name" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${name||''}</span>
                    </div>
                    <span class="sugg-exchange">${exchange}</span>
                `;
                div.onclick = () => {
                    insertItemsIntoTab(columnsState[colIndex], [fullTicker], true);
                    suggBox.style.display = 'none'; inputEl.value = '';
                };
                return div;
            }

            function makeManualItem(query) {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.innerHTML = `<div class="sugg-text-col"><span class="sugg-symbol">Add manually:</span></div><span class="sugg-exchange">${query}</span>`;
                div.onclick = () => { insertItemsIntoTab(columnsState[colIndex], [query], true); suggBox.style.display = 'none'; inputEl.value = ''; };
                return div;
            }

            inputEl.addEventListener('input', function() {
                const query = this.value.trim().toUpperCase();
                suggBox.innerHTML = '';
                
                if (query.toLowerCase().startsWith('/n ') || query.toLowerCase() === '/n' || !query || query.startsWith('-') || query.startsWith('=')) { 
                    suggBox.style.display = 'none'; return; 
                }

                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(async () => {
                    try {
                        const url = `https://symbol-search.tradingview.com/symbol_search/?text=${encodeURIComponent(query)}`;
                        const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
                        if (!res.ok) throw new Error();
                        const matches = await res.json();
                        suggBox.innerHTML = '';
                        if (matches && matches.length > 0) {
                            matches.slice(0, 10).forEach(m => suggBox.appendChild(makeSuggItem(m.symbol, m.description, m.exchange || m.prefix || '')));
                        } else {
                            suggBox.appendChild(makeManualItem(query));
                        }
                        suggBox.style.display = 'block';
                    } catch(e) {
                        suggBox.innerHTML = '';
                        suggBox.appendChild(makeManualItem(query));
                        suggBox.style.display = 'block';
                    }
                }, 350);
            });

            inputEl.addEventListener('keypress', e => {
                if (e.key === 'Enter' && inputEl.value.trim()) {
                    let val = inputEl.value.trim();
                    
                    if (val.toLowerCase().startsWith('/n ')) {
                        const arg = val.substring(3).trim().toUpperCase();
                        let currentTabItems = getItemsForTab(columnsState[colIndex]);
                        let foundTicker = arg;
                        for (let item of currentTabItems) {
                            if (!item.startsWith('---') && (item === arg || item.endsWith(':' + arg))) {
                                foundTicker = item;
                                break;
                            }
                        }
                        let urlSymbol = foundTicker.replace(':', '-');
                        window.open(`https://www.tradingview.com/symbols/${urlSymbol}/news/`, '_blank');
                    } else {
                        insertItemsIntoTab(columnsState[colIndex], [val.toUpperCase()], true);
                    }
                    
                    inputEl.value = ''; suggBox.style.display = 'none';
                    e.preventDefault();
                }
            });

            document.addEventListener('click', e => { if (e.target !== inputEl) suggBox.style.display = 'none'; }, { passive: true });

            const importWrap = document.createElement('div');
            importWrap.className = 'import-wrapper';
            importWrap.innerHTML = '<span>Or</span>';
            const batchBtn = document.createElement('button');
            batchBtn.className = 'bottom-btn'; batchBtn.innerText = 'Batch Import';
            batchBtn.onclick = () => openTabEditor(columnsState[colIndex]);
            importWrap.appendChild(batchBtn);

            inputWrap.appendChild(inputEl); inputWrap.appendChild(suggBox);
            bottomBar.appendChild(inputWrap); bottomBar.appendChild(importWrap);
            return bottomBar;
        }

        // --- BACKGROUND IFRAME INJECTION ---
        function injectWidget(colIndex, tabName, tabs) {
            const tabData = (tabs || getParsedTabs()).find(t => t.name === tabName);
            const items = tabData ? tabData.items : [];
            const hash = itemHash(items);
            const ckey = widgetCacheKey(colIndex, tabName);

            const layerId = `wlayer-${colIndex}-${tabName.replace(/\W/g,'_')}`;
            const layer = document.getElementById(layerId);
            if (!layer) return;

            if (widgetCache[ckey] === hash && layer.children.length > 0) return; 
            widgetCache[ckey] = hash;

            layer.innerHTML = ''; 

            const widgetDiv = document.createElement('div');
            widgetDiv.className = 'stealth-widget';
            const containerDiv = document.createElement('div');
            containerDiv.className = 'tradingview-widget-container';
            const placeholder = document.createElement('div');
            placeholder.className = 'tradingview-widget-container__widget';
            containerDiv.appendChild(placeholder);

            let groups = [], currentSymbols = [], currentName = '', gc = 1;
            items.forEach(item => {
                if (item.startsWith('---')) {
                    if (currentSymbols.length > 0) { groups.push({ name: currentName, symbols: currentSymbols }); currentSymbols = []; }
                    else if (currentName !== '') groups.push({ name: currentName, symbols: [] });
                    const raw = item.replace('---', '').trim();
                    currentName = raw !== '' ? raw : ('\xA0' + '\u200B'.repeat(gc++));
                } else {
                    currentSymbols.push({ name: item });
                }
            });
            if (currentSymbols.length > 0) groups.push({ name: currentName, symbols: currentSymbols });
            else if (currentName !== '') groups.push({ name: currentName, symbols: [] });
            if (groups.length === 0) groups.push({ name: '\u200B'.repeat(gc++), symbols: [] });

            const script = document.createElement('script');
            script.type = 'text/javascript';
            script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js';
            script.async = true;
            script.innerHTML = JSON.stringify({
                width: '100%', height: '100%',
                symbolsGroups: groups,
                showSymbolLogo: false, colorTheme: 'dark',
                isTransparent: false, backgroundColor: '#050505', locale: 'en'
            });

            containerDiv.appendChild(script);
            widgetDiv.appendChild(containerDiv);
            layer.appendChild(widgetDiv);
        }

        // --- SILENT IN-PLACE UPDATES ---
        function insertItemsIntoTab(tabName, newItems, append = false) {
            if (!myTickers.length || !myTickers[0].startsWith('===')) myTickers.unshift('=== MAIN');

            const built = [];
            let inTarget = false, found = false;

            for (let i = 0; i < myTickers.length; i++) {
                if (myTickers[i].startsWith('===')) {
                    const cur = myTickers[i].replace('===', '').trim();
                    if (cur === tabName) {
                        inTarget = true; found = true;
                        built.push(`=== ${tabName}`);
                        if (append) {
                            let j = i + 1;
                            while (j < myTickers.length && !myTickers[j].startsWith('===')) built.push(myTickers[j++]);
                            built.push(...newItems);
                            i = j - 1;
                        } else {
                            built.push(...newItems);
                        }
                    } else {
                        inTarget = false; built.push(myTickers[i]);
                    }
                } else {
                    if (!inTarget) built.push(myTickers[i]);
                }
            }
            if (!found) { built.push(`=== ${tabName}`); built.push(...newItems); }
            myTickers = built;

            invalidateTabWidgets(tabName);
            saveLocalState();
            debouncedGistPush();

            if (!found) {
                renderApp();
            } else {
                columnsState.forEach((activeTab, colIndex) => {
                    if (activeTab === tabName) updateColumnWidget(colIndex);
                });
            }
        }

        function updateColumnWidget(colIndex) {
            const tabs = getParsedTabs();
            const activeTabName = columnsState[colIndex];

            const stack = document.getElementById(`wstack-${colIndex}`);
            if (!stack) return; 

            tabs.forEach(tab => {
                const lid = `wlayer-${colIndex}-${tab.name.replace(/\W/g,'_')}`;
                if (!document.getElementById(lid)) {
                    const layer = document.createElement('div');
                    layer.className = 'widgetLayer';
                    layer.id = lid;
                    stack.appendChild(layer);
                }
            });

            stack.querySelectorAll('.widgetLayer').forEach(l => l.classList.remove('active'));
            const activeLayer = document.getElementById(`wlayer-${colIndex}-${activeTabName.replace(/\W/g,'_')}`);
            if (activeLayer) activeLayer.classList.add('active');

            injectWidget(colIndex, activeTabName, tabs);
        }

        function updateColumnTabBar(colIndex) {
            const tabs = getParsedTabs();
            const activeTabName = columnsState[colIndex];
            const oldBar = document.getElementById(`tabbar-${colIndex}`);
            if (!oldBar) return;
            const newBar = buildTabBar(colIndex, activeTabName, tabs);
            oldBar.replaceWith(newBar);
        }

        // --- MODAL CONTROLS ---
        function openTabEditor(tabName) { editingTabName = tabName; document.getElementById('tabEditorTitle').innerText = `BATCH IMPORT: [${tabName}]`; document.getElementById('tabEditor').value = getItemsForTab(tabName).join('\n'); document.getElementById('tabEditorModal').classList.add('visible'); updateHeaderActiveStates(); }
        function closeTabEditor() { document.getElementById('tabEditorModal').classList.remove('visible'); updateHeaderActiveStates(); }
        function saveTabEdit() { const rawText = document.getElementById('tabEditor').value; const newItems = rawText.split('\n').map(t => t.trim()).filter(t => t !== ""); insertItemsIntoTab(editingTabName, newItems, false); closeTabEditor(); }

        function openMasterEditor() { document.getElementById('masterEditor').value = myTickers.join('\n'); document.getElementById('masterEditorModal').classList.add('visible'); updateHeaderActiveStates(); }
        function closeMasterEditor() { document.getElementById('masterEditorModal').classList.remove('visible'); updateHeaderActiveStates(); }
        function saveMasterEdit() { myTickers = document.getElementById('masterEditor').value.split('\n').map(t => t.trim()).filter(Boolean); closeMasterEditor(); workspace.innerHTML = ''; invalidateAllWidgets(); saveLocalState(); debouncedGistPush(); renderApp(); }

        function toggleJournal() { const modal = document.getElementById('journalModal'); modal.classList.toggle('visible'); if(modal.classList.contains('visible')) { journalInput.focus(); } updateHeaderActiveStates(); }

        window.onload = () => { applyColorMode(); if(myTickers.length === 0) myTickers = ["=== MAIN", "NASDAQ:AAPL", "NASDAQ:MSFT"]; renderApp(); autoPullFromGist(); };
    </script>
</body>
</html>
